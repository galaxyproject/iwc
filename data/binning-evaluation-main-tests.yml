- doc: Test outline for MAGs-binning-evaluation
  job:
    Assemblies:
      class: Collection
      collection_type: list
      elements:
      - class: File
        filetype: fasta
        identifier: marine_pooled_gsa_trimmed
        location: https://zenodo.org/records/17107943/files/workflow_test_assamble.fasta
    Binette contamination weight: '2'
    Binette min completeness: '40'
    Biobox File:
      class: Collection
      collection_type: list
      elements:
      - class: File
        filetype: tabular
        identifier: marine_pooled_gsb_trimmed
        location: https://zenodo.org/records/17107943/files/workflow_test_gsb.tabular
    CONCOCT Kmer length: '4'
    CONCOCT Percentage of variance: '90'
    CONCOCT Read length: '100'
    CONCOCT Seed: '1'
    CONCOCT Sequence length threshold: '1000'
    CONCOCT max numbers of Cluster: '400'
    CONCOCT number of iterations: '500'
    DAS Tool max iterations: '10'
    DAS Tool penalty for duplicate: '0.6'
    DAS Tool penalty megabins: '0.5'
    DAS Tool score threshold: '0.5'
    ML Threshold for SemiBin: null
    MaxBin2 min contig length: '1000'
    MaxBin2 number of iteration: '50'
    MaxBin2 probability threshold: '0.5'
    MetaBAT2 TNF probability: '0'
    MetaBAT2 max number for edges: '200'
    MetaBAT2 mean coverage: '0.001'
    MetaBAT2 min score: '2'
    MetaBAT2 min size of contig: '1500'
    MetaBAT2 min total effective: '0.001'
    MetaBAT2 percentage for binning: '2'
    Reads:
      class: Collection
      collection_type: list:paired
      elements:
      - class: Collection
        elements:
        - class: File
          filetype: fastqsanger
          identifier: forward
          location: https://zenodo.org/records/17107943/files/workflow_test_forward.fastqsanger
        - class: File
          filetype: fastqsanger
          identifier: reverse
          location: https://zenodo.org/records/17107943/files/workflow_test_reverse.fastqsanger
        identifier: _trimmed
        type: paired
    Seed: '0'
    SemiBin Batch size: '2048'
    SemiBin number of epoches: '20'
  outputs:
    AMBER Bin Metric:
      asserts:
      - has_n_columns:
          n: 16
      - has_n_lines:
          delta: 10
          n: 188
    AMBER Genome Metric:
      asserts:
      - has_n_columns:
          n: 16
      - has_n_lines:
          delta: 10
          n: 1100
    AMBER HTML Report:
      asserts:
      - has_size:
          delta: 150000
          value: 2454860
    AMBER Result Table:
      asserts:
      - has_n_columns:
          n: 39
      - has_n_lines:
          n: 8
