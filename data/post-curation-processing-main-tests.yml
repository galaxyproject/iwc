- doc: Test post-curation processing with synthetic data
  job:
    Assembly Name: testAsm
    Bin Size for BigWig files: 100
    Canonical telomeric pattern: TTAGGG
    Curated AGP file:
      class: File
      filetype: tabular
      hashes:
      - hash_function: SHA-1
        hash_value: 5185f176d2d92c10e02f26e578603aec0c1baca4
      location: https://zenodo.org/records/19101571/files/test_curation.agp
    Database For Compleasm Lineages: v5
    Expected Genome Size: null
    Fasta file with both haplotypes:
      class: File
      filetype: fasta
      hashes:
      - hash_function: SHA-1
        hash_value: f2c93e14f10f9525d120a942316203d213805ba4
      location: https://zenodo.org/records/19101571/files/test_assembly.fasta
    Generate Gene tracks with Compleasm?: true
    Generate high resolution Hi-C maps?: false
    Genome larger than 10GB: false
    Hi-C reads:
      class: Collection
      collection_type: list:paired
      elements:
      - class: Collection
        collection_type: paired
        elements:
        - class: File
          filetype: fastqsanger.gz
          hashes:
          - hash_function: SHA-1
            hash_value: 5e531589f9248ccf7c4d677edffc060683167dba
          identifier: forward
          location: https://zenodo.org/records/19101571/files/HiC_forward.fastqsanger.gz
        - class: File
          filetype: fastqsanger.gz
          hashes:
          - hash_function: SHA-1
            hash_value: aaaeec9daf27cfee04ee46feb28c3d202b21a86c
          identifier: reverse
          location: https://zenodo.org/records/19101571/files/HiC_reverse.fastqsanger.gz
        identifier: HiC_set_1
    Lineage for Compleasm Genes: vertebrata_odb10
    Minimum Mapping Quality: 10
    PacBio reads:
      class: Collection
      collection_type: list
      elements:
      - class: File
        filetype: fastqsanger.gz
        hashes:
        - hash_function: SHA-1
          hash_value: 9c7c1af0887a9825d5391c783127aaa7321b6401
        identifier: PacBio_set_1
        location: https://zenodo.org/records/19101571/files/PacBio_reads.fastq.gz
    Remove adapters from HiFi reads?: false
    Remove duplicated Hi-C reads?: true
    Species Name: Test_species
    Telomere patterns to explore: TTAGGG,CCCTAA
    Trim the Hi-C data?: false
  outputs:
    Assembly statistics:
      asserts:
      - has_size:
          delta: 1000000
          value: 1
    Chromosome Hap1 Csv:
      asserts:
      - has_size:
          delta: 1000000
          value: 1
    Chromosome Hap2 Csv:
      asserts:
      - has_size:
          delta: 1000000
          value: 1
    Chromosome mapping Hap1:
      asserts:
      - has_text:
          text: SUPER_1
      - has_n_lines:
          n: 4
    Chromosome mapping Hap2:
      asserts:
      - has_text:
          text: SUPER_1
      - has_text:
          text: SUPER_Z
      - has_text:
          text: SUPER_W
      - has_n_lines:
          n: 5
    Corrected AGP:
      asserts:
      - has_text:
          text: scaffold_1.H1
      - has_text:
          text: scaffold_5.H1
    Curated Hap1:
      asserts:
      - has_size:
          delta: 50000
          value: 270000
    Curated Hap2:
      asserts:
      - has_size:
          delta: 50000
          value: 410000
    Hap1 AGP:
      asserts:
      - has_text:
          text: Scaffold_1
      - has_text:
          text: Hap_1
    Hap1 Hap2 orientation mapping:
      asserts:
      - has_text:
          text: Main Orientation
      - has_text:
          text: '-'
    Hap1 Hi-C duplication stats on Curated Assembly:
      asserts:
      - has_text:
          text: ' -r '
      - not_has_text:
          text: 'WRITTEN: 600'
    'Hap1 Hi-C duplication stats on Curated Assembly: Raw':
      asserts:
      - has_text:
          text: cis
      - has_text:
          text: chrom_freq
    Hap1 Telomere Report:
      asserts:
      - has_text:
          text: "Total paths:\t4"
      - has_text:
          text: "Total telomeres:\t5"
      - has_text:
          text: "Two telomeres:\t2"
      - has_text:
          text: "One telomere:\t1"
    Hap2 Hi-C duplication stats on Curated Assembly:
      asserts:
      - has_text:
          text: ' -r '
      - not_has_text:
          text: 'WRITTEN: 600'
    Hap2 Telomere Report:
      asserts:
      - has_text:
          text: "Total paths:\t5"
      - has_text:
          text: SUPER_Z
      - has_text:
          text: SUPER_W
    Reorientation and renaming instructions:
      asserts:
      - has_text:
          text: RENAME
      - has_text:
          text: RVCP
      - has_n_lines:
          n: 4
    Sequences missing in mashmap:
      asserts:
      - has_n_lines:
          n: 0
