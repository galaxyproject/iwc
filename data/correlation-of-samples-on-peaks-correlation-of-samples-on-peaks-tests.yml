- doc: Test outline for correlation-of-samples-on-peaks
  job:
    BAM or CRAM files:
      class: Collection
      collection_type: list
      elements:
      - class: File
        filetype: bam
        identifier: sample2
        location: https://raw.githubusercontent.com/galaxyproject/iwc/main/workflows/epigenetics/correlation-of-samples-on-peaks/test-data/sample2.bam
      - class: File
        filetype: bam
        identifier: sample1
        location: https://raw.githubusercontent.com/galaxyproject/iwc/main/workflows/epigenetics/correlation-of-samples-on-peaks/test-data/sample1.bam
    Collection of peak files:
      class: Collection
      collection_type: list
      elements:
      - class: File
        filetype: bed
        identifier: peak2
        location: https://raw.githubusercontent.com/galaxyproject/iwc/main/workflows/epigenetics/correlation-of-samples-on-peaks/test-data/peak2.bed
      - class: File
        filetype: bed
        identifier: peak1
        location: https://raw.githubusercontent.com/galaxyproject/iwc/main/workflows/epigenetics/correlation-of-samples-on-peaks/test-data/peak1.bed
    Reference genome: mm39
  outputs:
    Correlation plot:
      path: test-data/correlation plot.png
    deepTools coverage matrix:
      compare: sim_size
      path: test-data/deeptools coverage matrix.deeptools_coverage_matrix
    deepTools raw counts:
      path: test-data/deeptool raw counts.tabular
      sort: true
