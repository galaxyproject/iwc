- doc: Test outline for Host-or-Contamination-removal-on-short-reads with a built-in
    genome index
  job:
    Choose Reference Genome: Use a built-in genome index
    Host/Contaminant Reference Genome: hg38
    Reference genome file: null
    Short-reads:
      class: Collection
      collection_type: list:paired
      elements:
      - class: Collection
        elements:
        - class: File
          filetype: fastqsanger.gz
          identifier: forward
          location: https://zenodo.org/records/15089018/files/MAG_reads_forward.fastqsanger.gz
        - class: File
          filetype: fastqsanger.gz
          identifier: reverse
          location: https://zenodo.org/records/15089018/files/MAG_reads_reverse.fastqsanger.gz
        identifier: pair
        type: paired
  outputs:
    Bowtie2 Mapping Statistics from Local Index:
      element_tests:
        pair:
          asserts:
            has_n_lines:
              n: 15
            has_text:
              text: 9462 reads
    MultiQC HTML Report:
      asserts:
      - has_text:
          text: pair
      - has_text:
          text: Bowtie
- doc: Test outline for Host-or-Contamination-Removal-on-Short-Reads with a reference
    genome from the history
  job:
    Choose Reference Genome: Use a reference genome from the history
    Host/Contaminant Reference Genome: apiMel3
    Reference genome file:
      class: File
      filetype: fasta
      location: https://zenodo.org/records/19664899/files/hg38.fasta
    Short-reads:
      class: Collection
      collection_type: list:paired
      elements:
      - class: Collection
        elements:
        - class: File
          filetype: fastqsanger.gz
          identifier: forward
          location: https://zenodo.org/records/15089018/files/MAG_reads_forward.fastqsanger.gz
        - class: File
          filetype: fastqsanger.gz
          identifier: reverse
          location: https://zenodo.org/records/15089018/files/MAG_reads_reverse.fastqsanger.gz
        identifier: pair
        type: paired
  outputs:
    Bowtie2 Mapping Statistics from Reference Input:
      element_tests:
        pair:
          asserts:
            has_n_lines:
              n: 15
            has_text:
              text: 9462 reads
    MultiQC HTML Report:
      asserts:
      - has_text:
          text: '0.0'
      - has_text:
          text: Paired-end
