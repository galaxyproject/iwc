- doc: Test outline for MAGs-taxonomy-annotation
  job:
    GTDB-Tk Database: full_database_release_220_downloaded_2024-10-19
    MAGs taxonomic classification with kMetaShot (optional): false
    Sequence collection:
      class: Collection
      collection_type: list
      elements:
      - class: File
        filetype: fasta
        identifier: 50contig_reads_binette_bin1.fasta
        location: https://zenodo.org/records/18635101/files/50contig_reads_binette_bin1.fasta
      - class: File
        filetype: fasta
        identifier: 50contig_reads_binette_bin2.fasta
        location: https://zenodo.org/records/18635101/files/50contig_reads_binette_bin2.fasta
      - class: File
        filetype: fasta
        identifier: 50contig_reads_binette_bin3.fasta
        location: https://zenodo.org/records/18635101/files/50contig_reads_binette_bin3.fasta
      - class: File
        filetype: fasta
        identifier: 50contig_reads_binette_bin4.fasta
        location: https://zenodo.org/records/18635101/files/50contig_reads_binette_bin4.fasta
    ass2ref for kMS: '0.0'
    kMetaShot Database: '2025-05-22'
  outputs:
    MultiQC HTML report:
      GTDB-NCBI mapping:
        element_tests:
          gtdbtk.bac120.summary:
            asserts:
            - text: gtdb_taxonomy
              that: has_text
            - text: NA
              that: has_text
            - text: species
              that: has_text
      GTDB-Tk summary files:
        element_tests:
          gtdbtk.bac120.summary:
            asserts:
            - text: 50contig_reads_binette_bin1.fasta
              that: has_text
            - text: Unclassified
              that: has_text
            - text: '95.0'
              that: has_text
      NCBI names to taxIDs mapping:
        element_tests:
          gtdbtk.bac120.summary:
            asserts:
            - text: ncbi_taxonomy
              that: has_text
            - text: unclassified
              that: has_text
            - text: '12908'
              that: has_text
      asserts:
      - text: GTDB-Tk
        that: has_text
      - text: Unclassified
        that: has_text
      full GTDB to NCBI mapping:
        element_tests:
          gtdbtk.bac120.summary:
            asserts:
            - text: classification
              that: has_text
            - text: '1648'
              that: has_text
            - text: species
              that: has_text
