- doc: Test 1 for Metadata and Sequences from BioProject IDs
  job:
    BioProject IDs:
      class: File
      filetype: txt
      location: https://raw.githubusercontent.com/galaxyproject/iwc/main/workflows/data-fetching/metadata-and-sequences-from-bioproject-ids/test-data/test1_single_prj_pe.txt
    Display detailed metadata table: true
    Expand sample attributes in metadata: false
    Include assay type in metadata: false
    Include sample attributes in metadata: false
  outputs:
    Paired End Reads:
      element_tests:
        SRR37073390:
          forward:
            compare: contains
            decompress: true
            path: test-data/test1_paired_end_collection_forward.fastq
          reverse:
            compare: contains
            decompress: true
            path: test-data/test1_paired_end_collection_reverse.fastq
    SRA metadata table:
      element_tests:
        PRJNA1417618:
          path: test-data/test1_metadata_file_split_file_000000.txt.tsv
