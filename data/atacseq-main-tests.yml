- doc: Test outline for ATACseq
  job:
    Bin size: 1000
    Effective genome size: 2700000000
    PE fastq input:
      class: Collection
      collection_type: list:paired
      elements:
      - class: Collection
        elements:
        - class: File
          filetype: fastqsanger.gz
          hashes:
          - hash_function: SHA-1
            hash_value: 0fd546fe61d5dcdec0d91c91c6ad02b4de1b40fc
          identifier: forward
          location: https://zenodo.org/record/3862793/files/SRR891268_chr22_enriched_R1.fastq.gz
        - class: File
          filetype: fastqsanger.gz
          hashes:
          - hash_function: SHA-1
            hash_value: 8572153e721ba209a716128854b4560664bdf23d
          identifier: reverse
          location: https://zenodo.org/record/3862793/files/SRR891268_chr22_enriched_R2.fastq.gz
        identifier: SRR891268_chr22_enriched
        type: paired
    Percentage of bad quality bases per read: 70
    Reference Genome: hg19
  outputs:
    1kb around summits:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
            has_n_lines:
              n: 220
    BAM filtered rmDup:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
            has_size:
              delta: 1000000
              value: 15810403
    Coverage from MACS2 (bigwig):
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
            has_size:
              delta: 200000
              value: 2892925
    MACS2 narrowPeak:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
            has_n_lines:
              n: 237
    MACS2 report:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
          - text: '# tag size is determined as 47 bps'
            that: has_text
          - text: '# total tags in treatment: 261890'
            that: has_text
    MarkDuplicates metrics:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
            has_text:
              text: '0.02'
    'MultiQC on input dataset(s): Stats':
      asserts:
        has_line:
          line: "Sample\tmacs2-d\tmacs2-peak_count\tpicard_mark_duplicates-PERCENT_DUPLICATION\t\
            bowtie_2_hisat2-overall_alignment_rate\tfastp-after_filtering_q30_rate\t\
            fastp-after_filtering_q30_bases\tfastp-filtering_result_passed_filter_reads\t\
            fastp-after_filtering_gc_content\tfastp-pct_surviving\tfastp-pct_adapter\t\
            fastp-before_filtering_read1_mean_length\tfastp-before_filtering_read2_mean_length"
        has_text_matching:
          expression: "SRR891268_chr22_enriched\t200.0\t237\t2.6[0-9]*\t98.[0-9]*\t\
            97.[0-9]*\t26.[0-9]*\t0.5[0-9]*\t47.[0-9]*\t99.[0-9]*\t13.[0-9]*\t50.0\t\
            50.0"
    MultiQC webpage:
      asserts:
      - text: <a href=
        that: has_text
      - text: <td>% Aligned</td>
        that: has_text
    Nb of reads in summits +-500bp:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
            has_line:
              line: '9522'
    bigwig_norm:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
            has_size:
              delta: 100000
              value: 1253177
    bigwig_norm2:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
            has_size:
              delta: 100000
              value: 1248419
    histogram of fragment length:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
            has_size:
              delta: 4000
              value: 47718
    mapping stats:
      element_tests:
        SRR891268_chr22_enriched:
          asserts:
          - text: 9407 (3.33%) aligned concordantly 0 times
            that: has_text
          - text: 153749 (54.35%) aligned concordantly exactly 1 time
            that: has_text
          - text: 119723 (42.32%) aligned concordantly >1 times
            that: has_text
