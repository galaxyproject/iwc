- doc: Test outline for aDNA-analysis.ga
  job:
    InputReads:
      class: File
      location: https://github.com/nf-core/test-datasets/raw/eager/testdata/Human/bam/JK2067.bam
      filetype: bam
    ReferenceGenome:
      class: File
      location: https://github.com/nf-core/test-datasets/raw/eager/reference/Human/hs37d5_chr21-MT.fa.gz
      filetype: fasta.gz
    HapMapChrXReference:
      class: File
      location: https://github.com/ANGSD/angsd/raw/master/RES/HapMapChrX.gz
      filetype: gz
  outputs:
    EndorSpyReport:
      asserts:
        has_text:
            text: "percent_on_target"
    SexdetERRmineReport:
      asserts:
        has_text:
            text: "Sex.DetERRmine"
    MtNucReport:
      asserts:
        has_text:
            text: "mtnuccalculator"
    BamQCReport:
      asserts:
        has_text:
            text: "Qualimap Report: BAM QC"
    DamageVisualisation:
      element_tests:
        dnacomp:
          asserts:
            has_text:
              text: "mapDamage"
        misincorporation:
          asserts:
            has_text:
              text: "mapDamage"
        5pCtoT_freq:
          asserts:
            has_text:
              text: "5pC>T"
        3pGtoA_freq:
          asserts:
            has_text:
              text: "3pG>A"
        Fragmisincorporation_plot:
          asserts:
            has_size:
              min: 100
        lgdistribution:
          asserts:
            has_text:
              text: "mapDamage"
        Length_plot:
          asserts:
            has_size:
              min: 100
    ANGSDReport:
      asserts:
        has_text:
            text: "Method1_MOM_estimate"
    bcftoolsReport:
      asserts:
        has_text:
            text: "ACT>TCGA"
    Kraken2Report:
      asserts:
        has_text:
            text: "root"
    MultiQCReport:
      asserts:
        has_text:
            text: "MultiQC"
