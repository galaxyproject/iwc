- doc: Test one BioProjectID paired end
  job:
    BioProject IDs:
      class: File
      path: test-data/single_prj_pe.txt
      hashes:
      - hash_function: SHA-1
        hash_value: ?
    --assay (metadata download): false
    --desc (metadata download): false
    --detailed (metadata download): true
    --expand (metadata download): false
    Group by Experiments (fastq download): false
    Group by Sample (fastq download): false
  outputs:
    paired_end_collection:
      element_tests:
        Check FASTQ F:
          file: test-data/xxxx_head_1.fastq
          decompress: true
          compare: contains
        Check FASTQ R:
          file: test-data/xxxx_head_2.fastq
          decompress: true
          compare: contains
    metadata_file:
      element_tests:
        Check Metadata:
          file: test-data/****
          decompress: false
          compare: contains

- doc: Test two BioProjectIDs single end
  job:
    BioProject IDs:
      class: File
      path: test-data/two_prjs_se.txt
      hashes:
      - hash_function: SHA-1
        hash_value: ?
    --assay (metadata download): false
    --desc (metadata download): false
    --detailed (metadata download): true
    --expand (metadata download): false
    Group by Experiments (fastq download): false
    Group by Sample (fastq download): false
  outputs:
    single_end_collection:
      element_tests:
        Check FASTQ A:
          file: test-data/xxxx_head_A.fastq
          decompress: true
          compare: contains
        Check FASTQ B: #credo che questo debba essere il nome dell'elemento su cui vai a fare check
          file: test-data/xxxx_head_B.fastq
          decompress: true
          compare: contains
    metadata_file:
      element_tests:
        Check Metadata:
          file: test-data/****
          decompress: false
          compare: contains
