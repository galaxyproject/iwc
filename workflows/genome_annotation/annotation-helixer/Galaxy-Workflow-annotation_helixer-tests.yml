- doc: Test outline for Helixer Workflow
  job:
    Genome sequence:
      class: File
      location: https://zenodo.org/records/13890774/files/genome_masked.fa?download=1
      filetype: fasta

  outputs:
    helixer output:
      asserts:
        - has_n_lines:
            n: 15236
        - has_text:
            text: "AUGUSTUS"
            text: "scaffold_100"   
    
    busco sum genome:
      asserts:
        - has_text:
            text: "BUSCO version is: 5.8.0"
            text: "mucorales_odb10" 
    busco gff genome:
      asserts:
        - has_text:
            text: "BUSCO version is: 5.8.0 "
            text: "mucorales_odb10"   
    busco missing genome:
      asserts:
        - has_text:
            text: "BUSCO version is: 5.8.0 "
            text: "mucorales_odb10"
        - has_n_lines:
            n:      
    busco table genome:
      asserts:
        - has_text:
            text: "gff-version 3"
            text: "miniprot"
        - has_n_lines:
            n:   
    
    gffread peptides:
      asserts:
        - has_n_lines:
            n:    
    
    summary:
   
    
    busco table peptides:
      asserts:
        - has_text:
            text: "BUSCO version is: 5.8.0"
            text: "mucorales_odb10"  
    busco sum peptides:
      asserts:
        - has_text:
            text: "BUSCO version is: 5.8.0"
            text: "mucorales_odb10"   
    busco gff peptides:
      asserts:
        - has_text:
            text: "BUSCO version is: 5.8.0 "
            text: "mucorales_odb10"    
    busco missing peptides:
        - has_text:
            text: "BUSCO version is: 5.8.0"
            text: "mucorales_odb10"   
    
    omark detail sum:
      asserts:
        - has_n_lines:
            n: 63
        - has_text:
            text: "Mucorineae"