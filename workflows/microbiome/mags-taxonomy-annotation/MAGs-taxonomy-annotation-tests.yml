- doc: Test outline for MAGs-taxonomy-annotation
  job:
    Sequence collection:
      class: Collection
      collection_type: list
      elements:
      - class: File
        identifier: pan-genome
        path: test-data/Sequence collection_pan-genome.fasta
      - class: File
        identifier: 50contig_reads_binette_bin4
        path: test-data/Sequence collection_50contig_reads_binette_bin4.fasta
      - class: File
        identifier: 50contig_reads_binette_bin3
        path: test-data/Sequence collection_50contig_reads_binette_bin3.fasta
      - class: File
        identifier: 50contig_reads_binette_bin2
        path: test-data/Sequence collection_50contig_reads_binette_bin2.fasta
      - class: File
        identifier: 50contig_reads_binette_bin1
        path: test-data/Sequence collection_50contig_reads_binette_bin1.fasta
    GTDB-Tk Database: full_database_release_226_downloaded_2026-02-18
    MAGs taxonomic classification with kMetaShot (optional): true
    kMetaShot Database: '2025-05-22'
    ass2ref for kMS: '0.0'
  outputs:
    MultiQC HTML report:
      path: test-data/MultiQC HTML report.html
    NCBI names to taxIDs mapping:
      element_tests:
        gtdbtk.ar53.summary:
          path: test-data/NCBI names to taxIDs mapping_gtdbtk.ar53.summary.tabular
        gtdbtk.bac120.summary:
          path: test-data/NCBI names to taxIDs mapping_gtdbtk.bac120.summary.tabular
    GTDB-Tk summary files:
      element_tests:
        gtdbtk.ar53.summary:
          path: test-data/GTDB-Tk summary files_gtdbtk.ar53.summary.tsv
        gtdbtk.bac120.summary:
          path: test-data/GTDB-Tk summary files_gtdbtk.bac120.summary.tsv
    GTDB-NCBI mapping:
      element_tests:
        gtdbtk.ar53.summary:
          path: test-data/GTDB-NCBI mapping_gtdbtk.ar53.summary.tabular
        gtdbtk.bac120.summary:
          path: test-data/GTDB-NCBI mapping_gtdbtk.bac120.summary.tabular
    full GTDB to NCBI mapping:
      element_tests:
        gtdbtk.ar53.summary:
          path: test-data/full GTDB to NCBI mapping_gtdbtk.ar53.summary.tabular
        gtdbtk.bac120.summary:
          path: test-data/full GTDB to NCBI mapping_gtdbtk.bac120.summary.tabular
