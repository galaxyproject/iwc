- doc: Test for Metagenome-Assembled-Genomes-(MAGs)-generation short read only
  job:
    Trimmed reads:
      class: Collection
      collection_type: list:paired
      elements:
      - class: Collection
        type: paired
        identifier: test_minigut
        elements:
          - class: File
            identifier: forward
            location: https://zenodo.org/records/19235149/files/test_minigut_R1.fastq.gz
          - class: File
            identifier: reverse
            location: https://zenodo.org/records/19235149/files/test_minigut_R2.fastq.gz
    Trimmed paired reads from grouped samples:
      class: Collection
      collection_type: list:paired
      elements:
      - class: Collection
        type: paired
        identifier: test_minigut
        elements:
          - class: File
            identifier: forward
            location: https://zenodo.org/records/19235149/files/test_minigut_R1.fastq.gz
          - class: File
            identifier: reverse
            location: https://zenodo.org/records/19235149/files/test_minigut_R2.fastq.gz
    Choose Assembler: MEGAHIT
    Custom Assemblies: null
    Minimum length of contigs to output: '100'
    Read length (CONCOCT): '100'
    Environment for the built-in model (SemiBin): global
    Contamination weight (Binette): '100'
    CheckM2 Database: 1.0.2
    Minimum MAG completeness percentage: '1'
    Maximum MAG contamination percentage: '1'
    Minimum MAG length: '100'
    ANI threshold for dereplication: '0.99'
    Run COMEBin: false
  outputs:
    Full MultiQC Report:
      asserts:
      - that: has_text
        text: "minigut_reads_binette_bin10_fasta"
      - that: has_text
        text: "QUAST"
      - that: has_text
        text: "CheckM"
    Assembly Report:
      element_tests:
        minigut_reads:
          asserts:
          - that: has_text
            text: "All statistics are based on contigs of size"
          - that: has_size
            value: 373800
            delta: 50000
    Primary_clustering_dendrogram:
      asserts:
      - that: has_size
        value: 169000
        delta: 20000
    Cluster Assignment:
      asserts:
      - that: has_text
        text: "genome"
      - that: has_text
        text: "primary_cluster"
      - that: has_text
        text: "minigut_reads_binette_bin49.fasta"
    Dereplicated Bins:
      element_tests:
        minigut_reads_binette_bin1.fasta:
          asserts:
            value: 715700
            delta: 10000
    Merged CoverM Output:
      - that: has_text
        text: "Genome"
      - that: has_text
        text: "minigut_reads_binette_bin10"
    Merged Quast Output:
      asserts:
      - that: has_text
        text: "Assembly"
      - that: has_text
        text: "118"
      - that: has_text
        text: "minigut_reads_binette_bin10.fasta"
- doc: Test for Metagenome-Assembled-Genomes-(MAGs)-generation long read test
  job:
    Trimmed reads:
      class: Collection
      collection_type: list:paired
      elements:
      - class: Collection
        type: paired
        identifier: test_minigut
        elements:
          - class: File
            identifier: forward
            location: https://zenodo.org/records/19235149/files/test_minigut_R1.fastq.gz
          - class: File
            identifier: reverse
            location: https://zenodo.org/records/19235149/files/test_minigut_R2.fastq.gz
    Trimmed paired reads from grouped samples:
      class: Collection
      collection_type: list:paired
      elements:
      - class: Collection
        type: paired
        identifier: test_minigut
        elements:
          - class: File
            identifier: forward
            location: https://zenodo.org/records/19235149/files/test_minigut_R1.fastq.gz
          - class: File
            identifier: reverse
            location: https://zenodo.org/records/19235149/files/test_minigut_R2.fastq.gz
    Trimmed nanopore reads from grouped samples:
      class: Collection
      collection_type: list
      elements:
      - class: File
        identifier: minigut_reads
        location: https://zenodo.org/records/19235149/files/minigut_reads.fastq.gz 
    Choose Assembler: metaSPAdes
    Custom Assemblies: null
    Minimum length of contigs to output: '100'
    Read length (CONCOCT): '100'
    Environment for the built-in model (SemiBin): global
    Contamination weight (Binette): '100'
    CheckM2 Database: 1.0.2
    Minimum MAG completeness percentage: '1'
    Maximum MAG contamination percentage: '1'
    Minimum MAG length: '100'
    ANI threshold for dereplication: '0.99'
    Run COMEBin: false
  outputs:
    Full MultiQC Report:
      asserts:
      - that: has_text
        text: "minigut_reads_binette_bin1_fasta"
      - that: has_text
        text: "QUAST"
      - that: has_text
        text: "CheckM"
    Assembly Report:
      element_tests:
        minigut_reads:
          asserts:
          - that: has_text
            text: "All statistics are based on contigs of size"
          - that: has_size
            value: 361400
            delta: 50000
    out_cn:
      element_tests:
        minigut_reads:
          asserts:
            value: 1736000
            delta: 200000
    Primary_clustering_dendrogram:
      asserts:
      - that: has_size
        value: 131000
        delta: 20000
    Cluster Assignment:
      asserts:
      - that: has_text
        text: "genome"
      - that: has_text
        text: "primary_cluster"
      - that: has_text
        text: "minigut_reads_binette_bin2.fasta"
    Dereplicated Bins:
      element_tests:
        minigut_reads_binette_bin1.fasta:
          asserts:
            value: 848000
            delta: 10000
    Merged CoverM Output:
      - that: has_text
        text: "Genome"
      - that: has_text
        text: "unmapped"
      - that: has_text
        text: "minigut_reads_binette_bin2"
    Merged Quast Output:
      asserts:
      - that: has_text
        text: "Assembly"
      - that: has_text
        text: "4"
      - that: has_text
        text: "minigut_reads_binette_bin2.fasta"