- doc: |
    PGGB pangenome build smoke test. Three small PanSN-named FASTAs concatenated
    via fasta_concat, fed to pggb, with odgi_stats on the resulting .og.
  job:
    Strain FASTAs:
      class: Collection
      collection_type: list
      elements:
      - identifier: PvA
        class: File
        path: test-data/PvA.fa
        filetype: fasta
      - identifier: PvB
        class: File
        path: test-data/PvB.fa
        filetype: fasta
      - identifier: PvC
        class: File
        path: test-data/PvC.fa
        filetype: fasta
    n_haplotypes: 3
    segment_length: 500
    map_pct_id: 90.0
    min_match_len: 11
    vcf_spec: ""
  outputs:
    smoothed GFA:
      asserts:
        has_size:
          min: 100
    odgi .og:
      asserts:
        has_size:
          min: 100
    graph stats:
      asserts:
        has_text:
          text: "length"
    MultiQC report:
      asserts:
        has_text:
          text: "MultiQC"
