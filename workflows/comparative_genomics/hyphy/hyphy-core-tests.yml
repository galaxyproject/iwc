- doc: Test HyPhy Core produces HyPhy JSON collections
  job:
    reference GTF:
      class: File
      path: test-data/denv1_ref.gtf
      filetype: gtf
    reference Fasta:
      class: File
      path: test-data/denv1_genome.fasta
      filetype: fasta
    unaligned sequences:
      class: Collection
      collection_type: list
      elements:
      - identifier: AB178040.1|2002
        class: File
        path: test-data/unaligned_seqs/AB178040.1|2002.fasta
        filetype: fasta
      - identifier: AB195673.1|2003
        class: File
        path: test-data/unaligned_seqs/AB195673.1|2003.fasta
        filetype: fasta
      - identifier: AB204803.1|2004
        class: File
        path: test-data/unaligned_seqs/AB204803.1|2004.fasta
        filetype: fasta
      - identifier: AF298807.1|1998
        class: File
        path: test-data/unaligned_seqs/AF298807.1|1998.fasta
        filetype: fasta
      - identifier: AF298808.1|1998
        class: File
        path: test-data/unaligned_seqs/AF298808.1|1998.fasta
        filetype: fasta
  outputs:
    meme_output:
      class: Collection
      element_tests:
        "capsid_protein_C":
          asserts:
            has_text:
              text: "{"
        "membrane_glycoprotein_precursor_prM":
          asserts:
            has_text:
              text: "{"
    prime_output:
      class: Collection
      element_tests:
        "capsid_protein_C":
          asserts:
            has_text:
              text: "{"
        "membrane_glycoprotein_precursor_prM":
          asserts:
            has_text:
              text: "{"
    busted_output:
      class: Collection
      element_tests:
        "capsid_protein_C":
          asserts:
            has_text:
