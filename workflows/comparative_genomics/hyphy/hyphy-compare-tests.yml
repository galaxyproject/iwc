- doc: Test HyPhy Compare produces branch-labeled JSON collections
  job:
    Codon-aware alignment(s):
      class: Collection
      collection_type: list
      elements:
      - identifier: "NC_001477.1|capsid_protein_C|95-394_DENV1"
        class: File
        path: test-data/codon_alignments/capsid_protein_C.fasta
        filetype: fasta
      - identifier: "NC_001477.1|membrane_glycoprotein"
        class: File
        path: test-data/codon_alignments/membrane_glycoprotein.fasta
        filetype: fasta
    Phylogenetic tree(s):
      class: Collection
      collection_type: list
      elements:
      - identifier: "NC_001477.1|capsid_protein_C|95-394_DENV1"
        class: File
        path: test-data/iqtree_trees/capsid_protein_C.nhx
        filetype: newick
      - identifier: "NC_001477.1|membrane_glycoprotein"
        class: File
        path: test-data/iqtree_trees/membrane_glycoprotein.nhx
        filetype: newick
    Foreground Sequences List:
      class: File
      path: test-data/foreground_seqs_list.txt
      filetype: txt
  outputs:
    cfel_output:
      element_tests:
        "NC_001477.1|capsid_protein_C|95-394_DENV1":
          asserts:
            has_text:
              text: "{"
        "NC_001477.1|membrane_glycoprotein":
          asserts:
            has_text:
              text: "{"
    relax_output:
      element_tests:
        "NC_001477.1|capsid_protein_C|95-394_DENV1":
          asserts:
            has_text:
              text: "{"
        "NC_001477.1|membrane_glycoprotein":
          asserts:
            has_text:
              text: "{"
