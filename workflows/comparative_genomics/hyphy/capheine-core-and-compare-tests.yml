- doc: Test CAPHEINE with reference CDS and unaligned sequences only (Core workflow only)
  job:
    reference cds:
      class: File
      path: test-data/denv1_ref_cds.fasta
      filetype: fasta
    unaligned sequences:
      class: Collection
      collection_type: list
      elements:
      - identifier: AB178040.1|2002
        class: File
        path: test-data/unaligned_seqs/AB178040.1|2002.fasta
        filetype: fasta
      - identifier: AB195673.1|2003
        class: File
        path: test-data/unaligned_seqs/AB195673.1|2003.fasta
        filetype: fasta
      - identifier: AB204803.1|2004
        class: File
        path: test-data/unaligned_seqs/AB204803.1|2004.fasta
        filetype: fasta
      - identifier: AF298807.1|1998
        class: File
        path: test-data/unaligned_seqs/AF298807.1|1998.fasta
        filetype: fasta
      - identifier: AF298808.1|1998
        class: File
        path: test-data/unaligned_seqs/AF298808.1|1998.fasta
        filetype: fasta
  outputs:
    combined_summary:
      asserts:
        has_text:
          text: "gene"
        has_text:
          text: "BUSTED"
        has_text:
          text: "MEME"
        has_text:
          text: "pval"
        has_text:
          text: "omega"
        has_n_columns:
          n: 9

- doc: Test CAPHEINE with reference CDS, unaligned sequences, and regex (no foreground list)
  job:
    reference cds:
      class: File
      path: test-data/denv1_ref_cds.fasta
      filetype: fasta
    unaligned sequences:
      class: Collection
      collection_type: list
      elements:
      - identifier: PP563838.1|2023-09-30
        class: File
        path: test-data/unaligned_seqs/PP563838.1|2023-09-30.fasta
        filetype: fasta
      - identifier: PP563839.1|2023-09-29
        class: File
        path: test-data/unaligned_seqs/PP563839.1|2023-09-29.fasta
        filetype: fasta
      - identifier: PP563841.1|2023-09-25
        class: File
        path: test-data/unaligned_seqs/PP563841.1|2023-09-25.fasta
        filetype: fasta
      - identifier: AB178040.1|2002
        class: File
        path: test-data/unaligned_seqs/AB178040.1|2002.fasta
        filetype: fasta
      - identifier: AB195673.1|2003
        class: File
        path: test-data/unaligned_seqs/AB195673.1|2003.fasta
        filetype: fasta
    foreground regexp (optional): "_2023_09_"
  outputs:
    combined_summary:
      asserts:
        has_text:
          text: "gene"
        has_text:
          text: "BUSTED"
        has_text:
          text: "MEME"
        has_text:
          text: "RELAX"
        has_text:
          text: "pval"
        has_n_columns:
          n: 12
    combined_comparison_summary:
      asserts:
        has_text:
          text: "gene"
        has_text:
          text: "comparison_group"
        has_text:
          text: "Foreground"
        has_text:
          text: "Reference"
        has_n_columns:
          n: 6

