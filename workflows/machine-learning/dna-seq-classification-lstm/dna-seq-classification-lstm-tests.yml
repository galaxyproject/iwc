- doc: Test outline for parallel-accession-download.ga
  job:
    Labels of DNA sequences:
      class: File
      path: "test-data/dna-sequence-labels.tabular"
      filetype: "tabular"
    DNA sequences:
        class: File
        path: "test-data/dna-sequences.fasta"
        filetype: "fasta"
  outputs:
    Confusion matrix:
      asserts:
        has_line:
          line: "$$$$"
          n: 4
    outfile_predict:
      asserts:
        class: 'File'
        has_n_lines: 26
        has_n_columns: 3