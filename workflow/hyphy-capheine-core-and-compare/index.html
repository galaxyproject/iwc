[0,&quot;CAPHEINE: Combined HyPhy Core and Compare&quot;],&quot;readme&quot;:[0,&quot;# CAPHEINE: Combined HyPhy Core &amp; Compare Workflow\n\n## Description\nCAPHEINE orchestrates an evolutionary discovery and analysis pipeline: it runs the core codon-aware preprocessing (fasta cleanup, cawlign, IQ-TREE) and HyPhy analyses (FEL, MEME, PRIME, BUSTED). When configured, CAPHEINE also runs the branch-comparison module (label-tree + Contrast-FEL + RELAX). The workflow is inspired by the Nextflow implementation at [veg/capheine](https://github.com/veg/capheine).\n\n## Inputs\n1. Assemblies (list collection of FASTA). Unaligned coding sequences, one per sample.\n2. Reference CDS FASTA. Multi-gene CDS file (e.g. from NCBI).\n3. Foreground ID list (optional dataset). Sequence identifiers, one per line; used to tag branches as Foreground vs Reference.\n4. Foreground regex (optional text). Applied to the sequence identifiers to build the Foreground list automatically.\n\n### Behavior:\nIf neither the list nor regex is supplied → run only the Core portion.\nIf a regex is supplied → derive the Foreground set from matches and run Compare.\nIf only a list is supplied → use it directly for Compare.\nIf both are supplied → the regex is applied and the explicit list is ignored.\n\n## Outputs\n\n### From the Core (always produced):\n1. Codon-aware alignments (collection, FASTA) – cawlign output.\n2. Gene trees (collection, Newick) – IQ-TREE output.\n3. HyPhy MEME results (collection, JSON).\n4. HyPhy PRIME results (collection, JSON).\n5. HyPhy BUSTED results (collection, JSON).\n6. HyPhy FEL results (collection, JSON).\n\n### From the Compare module (only when Foreground info is provided):\n1. Labeled trees (collection, Newick) – HyPhy Annotate marking {Foreground} vs {Reference}.\n2. HyPhy CFEL results (collection, JSON) – site-level comparison.\n3. HyPhy RELAX results (collection, JSON) – test for relaxed/intensified selection.\n\n## Recommended Use\nMirrors the HyPhy Core workflo &quot;:[0,&quot;0000-0003-1967-4403&quot;],&quot;name&quot;:[0,&quot;Hannah Verdonk&quot;]}],[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;0000-0003-4817-4029&quot;],&quot;name&quot;:[0,&quot;Sergei L. Kosakovsky Pond&quot;]}]]],&quot;format-version&quot;:[0,&quot;0.1&quot;],&quot;license&quot;:[0,&quot;MIT&quot;],&quot;name&quot;:[0,&quot;HyPhy: Compare&quot;],&quot;readme&quot;:[0,&quot;# HyPhy: Compare\n\n## Description\nThis workflow consumes the per-gene codon-aware alignments and IQ-TREE phylogenies produced by the HyPhy preprocessing workflow and compares two branch classes: Foreground branches defined by a user-provided list, and all remaining branches (Reference). It labels each tree with the HyPhy Annotate tool, then runs HyPhy Contrast-FEL (CFEL) and HyPhy RELAX on every gene to quantify site-wise and branch-wise selection differences.\n\n## Inputs\n1. Codon-aware alignments (collection, FASTA). Output of the preprocessing workflow; one alignment per gene.\n2. IQ-TREE phylogenies (collection, Newick). Matching tree collection output from the preprocessing workflow, with identical element identifiers.\n3. Foreground identifiers (dataset). Plain-text list of cleaned sequence names. Any branch whose label matches an entry becomes Foreground; all others become Reference.\n\n## Outputs\n1. Labeled trees (collection, Newick). Trees with {Foreground} or {Reference} tags suitable for downstream HyPhy tools.\n2. HyPhy CFEL results (collection, JSON). Site-level contrast of nonsynonymous vs synonymous rates between the two branch sets.\n3. HyPhy RELAX results (collection, JSON). Gene-level test for relaxation or intensification of selection on the Foreground branches.\n\n## Key Tools\n1. HyPhy Annotate (label-tree) – Marks Foreground vs Reference branches based on the identifier list.\n2. HyPhy CFEL – Site-level contrast between branch sets.\n3. HyPhy RELAX – Tests for relaxed/intensified selection between Foreground and Reference.\n\ ary&quot;],&quot;uuid&quot;:[0,&quot;85dbd03e-2d1c-403c-946a-05b6e65d5978&quot;]}],[0,{&quot;label&quot;:[0,&quot;combined_comparison_site&quot;],&quot;output_name&quot;:[0,&quot;combined_comparison_site&quot;],&quot;uuid&quot;:[0,&quot;652911be-b263-4d20-8144-0c37ab2fc554&quot;]}]]]}]}],&quot;tags&quot;:[1,[]],&quot;uuid&quot;:[0,&quot;e1fbea6f-563e-40d1-b580-f97883fca29f&quot;],&quot;version&quot;:[0,1],&quot;release&quot;:[0,&quot;0.1&quot;]}],&quot;workflow_job_input&quot;:[0,{&quot;reference cds&quot;:[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}],&quot;unaligned sequences&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;todo_element_name&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]]]}]}],&quot;readme&quot;:[0,&quot;# HyPhy Workflows for Comparative Genomics\n\nThis directory contains Galaxy workflows for running HyPhy (Hypothesis Testing using Phylogenies) selection analysis pipelines on coding sequences.\n\n## Workflows\n\n&gt; **Current scope**: These workflow are tuned for viral analyses. Genes containing internal stop codons or ongoing recombination may produce failures or, worse, yield misleading HyPhy estimates. Treat bacterial/eukaryotic runs with caution unless you have validated inputs.\n\n### 1. CAPHEINE: Combined HyPhy Core and Compare (`capheine-core-and-compare.ga`)\n\nThe main workflow that orchestrates the complete HyPhy pipeline, including codon-aware preprocessing and optional branch-comparison analyses. Inspired by the [veg/capheine](https://github.com/veg/capheine) Nextflow implementation, version 1.1.0.\n\n**Inputs:**\n- **Reference CDS FASTA** (required): Multi-gene CDS reference file (e.g., from NCBI)\n- **Unaligned sequences** (required): List collection of FASTA files, one per sample\n- **Foreground regexp** (optional): Regular expression to match foreground sequence names for branch labeling\n- **Foreground list** (optional): Dataset with cleaned sequence identifiers for foreground branches\n\n**Behavior:**\n- If neither regex nor list is provided → runs Core workflow only\n- If regex is provided → derives foreground set from matches and runs Compare module\n- If only list is provided → uses it directly for Compare module\n- If both are provided → regex takes precedence, list is ignored\n\n**Outputs:**\n\n*Core outputs (always produced):*\n- Codon-aware alignments (collection, FASTA)\n- Gene trees (collection, Newick)\n- HyPhy MEME results (collection, JSON)\n- HyPhy PRIME results (collection, JSON)\n- HyPhy BUSTED results (collection, JSON)\n- HyPhy FEL results (collection, JSON)\n\n*Compare outputs (when foreground info provided):*\n- Labeled trees (collection, Newick)\n- HyPhy CFEL results (collection, JSON)\n- HyPhy RELAX results (collection, JSON)\n\n### 2. HyPhy Core (`hyphy-core.ga`)\n\nSubworkflow for codon-aware preprocessing and core selection analyses.\n\n### 3. HyPhy Compare (`hyphy-compare.ga`)\n\nSubworkflow for branch-comparison analyses (CFEL and RELAX).\n\n### 4. HyPhy Preprocessing (`hyphy-preprocessing.ga`)\n\nSubworkflow for sequence cleanup and codon-aware alignment.\n\n## Test Data\n\nThe `test-data/` directory contains:\n- `denv1_ref_cds.fasta`: Reference coding sequences from Dengue virus 1\n- `foreground_seqs_list.tabular`: Example foreground sequence identifiers\n- `unaligned_seqs/`: Directory with 39 unaligned FASTA files for testing\n\n## Running Tests\n\nTests are defined in `capheine-core-and-compare-tests.yml` with four scenarios:\n1. Core only (reference CDS + unaligned sequences)\n2. Core + Compare with regex (no foreground list)\n3. Core + Compare with foreground list (no regex)\n4. Core + Compare with all inputs (regex takes precedence)\n\n## References\n\n- HyPhy: [https://github.com/veg/hyphy](https://github.com/veg/hyphy)\n- CAPHEINE Nextflow: [https://github.com/veg/capheine](https://github.com/veg/capheine)\n&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [0.1] - 2026-02-26\n\n### Added\n- Initial release of HyPhy workflows for comparative genomics\n- CAPHEINE: Combined HyPhy Core and Compare workflow\n  - Orchestrates complete HyPhy pipeline with codon-aware preprocessing\n  - Optional branch-comparison analyses (CFEL and RELAX)\n  - Supports foreground/background branch labeling via regex or explicit list\n- HyPhy Core subworkflow\n  - Codon-aware preprocessing and alignment\n  - Core selection analyses (MEME, PRIME, BUSTED, FEL)\n- HyPhy Compare subworkflow\n  - Branch-comparison analyses (CFEL and RELAX)\n- HyPhy Preprocessing subworkflow\n  - Sequence cleanup and codon-aware alignment\n- Comprehensive test suite with 4 scenarios for CAPHEINE workflow\n- Test data including DENV1 reference CDS and 39 unaligned sequences\n&quot;],&quot;diagrams&quot;:[0,&quot;# Workflow diagrams\n\n## CAPHEINE: Combined HyPhy Core and Compare\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ reference cds\&quot;]@{ shape: doc }\n1[\&quot;ℹ️ unaligned sequences\&quot;]@{ shape: docs }\n2[\&quot;ℹ️ foreground regexp (optional)\&quot;]@{ shape: lean-l }\n3[\&quot;ℹ️ foreground list (optional)\&quot;]@{ shape: doc }\n4[\&quot;🛠️ HyPhy: Core\&quot;]@{ shape: subprocess }\n0 --&gt; 4\n1 --&gt; 4\n5[\&quot;Save RegEx to File\&quot;]@{ shape: process }\n2 --&gt; 5\n6[\&quot;Collect Sequence Identifiers\&quot;]@{ shape: process }\n4 --&gt; 6\n7[\&quot;Clean RegEx\&quot;]@{ shape: process }\n5 --&gt; 7\n8[\&quot;Collapse Collection\&quot;]@{ shape: process }\n6 --&gt; 8\n9[\&quot;Count characters in RegEx\&quot;]@{ shape: process }\n7 --&gt; 9\n10[\&quot;Unique\&quot;]@{ shape: process }\n8 --&gt; 10\n11[\&quot;Check is RegEx Empty\&quot;]@{ shape: process }\n9 --&gt; 11\n12[\&quot;Trim\&quot;]@{ shape: process }\n10 --&gt; 12\n13[\&quot;(Boolean) Continue Foreground Sequence List Creation\&quot;]@{ shape: process }\n1
