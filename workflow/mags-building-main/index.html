,3],[0,1],[0,2],[0,5]]],&quot;color&quot;:[0,&quot;pink&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Input&quot;]}],&quot;id&quot;:[0,1],&quot;position&quot;:[1,[[0,0],[0,1567.845569700953]]],&quot;size&quot;:[1,[[0,436],[0,638]]],&quot;type&quot;:[0,&quot;frame&quot;]}],[0,{&quot;child_steps&quot;:[1,[[0,17],[0,34],[0,0],[0,26],[0,25],[0,23],[0,18],[0,19],[0,27],[0,28],[0,29],[0,30],[0,31],[0,32],[0,33]]],&quot;color&quot;:[0,&quot;pink&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;metaSPADES with optional long reads&quot;]}],&quot;id&quot;:[0,0],&quot;position&quot;:[1,[[0,361.6],[0,0]]],&quot;size&quot;:[1,[[0,2579],[0,1494]]],&quot;type&quot;:[0,&quot;frame&quot;]}]]],&quot;creator&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;https://orcid.org/0000-0001-9852-1987&quot;],&quot;name&quot;:[0,&quot;Bérénice Batut&quot;]}],[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;https://orcid.org/0000-0003-2982-388X&quot;],&quot;name&quot;:[0,&quot;Paul Zierep&quot;]}],[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;https://orcid.org/0000-0002-3602-7884&quot;],&quot;name&quot;:[0,&quot;Mina Hojat Ansari&quot;]}],[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;&quot;],&quot;name&quot;:[0,&quot;Patrick Bühler&quot;]}],[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;https://orcid.org/0009-0004-0382-2023&quot;],&quot;name&quot;:[0,&quot;Santino Faack&quot;]}],[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;https://orcid.org/0000-0003-3813-0823&quot;],&quot;name&quot;:[0,&quot;Anna Syme&quot;]}]]],&quot;format-version&quot;:[0,&quot;0.1&quot;],&quot;license&quot;:[0,&quot;MIT&quot;],&quot;release&quot;:[0,&quot;0.5&quot;],&quot;name&quot;:[0,&quot;Metagenome-Assembled Genomes (MAGs) generation&quot;],&quot;readme&quot;:[0,&quot;# Metagenome-Assembled Genomes (MAGs) Generation\n\nThis workflow generates Metagenome-Assembled Genomes (MAGs) from paired short reads and optional long reads.\nThe use of long reads is only supported for assembly with **metaSPADES**.\nDereplicated MAGs for the complete input sample set are reported.\n\n## Workflow Logic\n\nThe workflow supports assembly using **metaSPADES** and **MEGAHIT**.\nFor binning, it utilizes five different tools: **MetaBAT2, MaxBin2, SemiBin, COMEBin, and CONCOCT**. The resulting bins are then refined using **Binette**, the successor of metaWRAP.\n\n## MAGs Annotation and Quality Control\n\nAfter binning, the resulting MAGs are **dereplicated** across all input samples based on **CheckM2 quality metrics** using **dRep**. The following processing steps are then performed:\n\n* **Quality Control** via QUAST and CheckM/CheckM2\n* **Abundance Estimation** per sample with CoverM\n\nIn previous versions, genome annotation and taxonomic annotation were also performed. This can now be done with dedicated and more comprehensive IWC workflows if needed:\n\n* [MAG Genome Annotation](https://iwc.galaxyproject.org/workflow/mag-genome-annotation-parallel-main)\n* [MAGs Taxonomy Annotation](https://iwc.galaxyproject.org/workflow/mags-taxonomy-annotation-main)\n* [Functional Annotation of Sequences](https://iwc.galaxyproject.org/workflow/functional-annotation-of-sequences-main)\n* [AMR Gene Detection](https://iwc.galaxyproject.org/workflow/amr_gene_detection-main)\n\nAll results are consolidated into a single **MultiQC report**.\n\n## Input Requirements\n\nInput reads must be quality-filtered, with host reads removed.\nSee other MAG workflows in IWC for quality filtering and host removal.\n\n**Short reads:**\n\n* QC: [Short Read QC &amp; Trimming](https://iwc.galaxyproject.org/workflow/short-read-qc-trimming-main)\n* Host removal: [Host Contamination Removal (Short Reads)](https://iwc.galaxyproject.org/workflow/host-contamination-removal-short-reads-main)\n\n**Long reads:**\n\n* QC: [Nanopore Pre-processing](https://iwc.galaxyproject.org/workflow/nanopore-pre-processing-main)\n* Host removal: [Host Contamination Removal (Long Reads)](https://iwc.galaxyproject.org/workflow/host-contamination-removal-long-reads-main)\n\n**Workflow input:**\n\n* **Trimmed reads**: Quality-trimmed reads from individual samples.\n* **Trimmed reads from grouped samples**: These reads need to be grouped based on the desired MAGs generation approach. The tool [fastq_groupmerge](toolshed.g2.bx.psu.edu/repos/iuc/fastq_groupmerge/fastq_groupmerge/1.0.1+galaxy0) can be used to perform the grouping. Long reads and short reads must be grouped using the same logic.\n\n  * **Individual MAGs Generation**: Use the same input as `Trimmed Reads` to generate MAGs per sample.\n  * **Pooled MAGs Generation (Co-assembly/Binning)**: Merge all reads into one file for a fully pooled MAGs approach.\n  * **Grouped MAGs Generation (Co-assembly/Binning)**: Merge samples based on predefined groups.\n  * **Hybrid MAGs Generation**: Combine individual and grouped reads for a mixed approach.\n\n&gt; **Note**: Merging reads can result in large input files, significantly increasing computational demands—especially during assembly and binning, which may require substantial RAM. Our tests with synthetic samples up to **50 GB** showed feasible performance. For larger datasets, we recommend limiting the approach to **individual or pooled MAGs generation**.\n\n## Optional Modifications\n\nSome modifications can be made via the workflow editor for specific use cases:\n\n* Compare binners/bin refinement: add CheckM/CheckM2 to each binner/refiner and compare completeness, contamination, and number of bins.\n* Optionally use DAS Tool instead of Binette (our benchmark showed that Binette produces better MAGs on average).\n* Downstream: compare differential abundance of MAGs in your samples based on metadata using Maaslin2.\n* Downstream: compare your MAGs to a catalogue of MAGs for similar samples. Download desired MAGs from [MGnify genomes](https://www.ebi.ac.uk/metagenomics/browse/genomes) and query your MAGs via the [MGnify API](https://www.ebi.ac.uk/metagenomics/browse/genomes?browse-by=mag-search); download the genomes and compare in Galaxy, e.g., using dRep.&quot;],&quot;report&quot;:[0,{&quot;markdown&quot;:[0,&quot;\n# Workflow Execution Report\n\n## Workflow Inputs\n```galaxy\ninvocation_inputs()\n```\n\n## Workflow Outputs\n```galaxy\ninvocation_outputs()\n```\n\n## Workflow\n```galaxy\nworkflow_display()\n```\n&quot;]}],&quot;steps&quot;:[0,{&quot;0&quot;:[0,{&quot;annotation&quot;:[0,&quot;&quot;],&quot;content_id&quot;:[0,&quot;toolshed.g2.bx.psu.edu/repos/bgruening/text_processing/tp_text_file_with_recurring_lines/9.5+galaxy3&quot;],&quot;errors&quot;:[0,null],&quot;id&quot;:[0,0],&quot;input_connections&quot;:[0,{}],&quot;inputs&quot;:[1,[]],&quot;label&quot;:[0,null],&quot;name&quot;:[0,&quot;Create text file&quot;],&quot;outputs&quot;:[1,[[0,{&quot;name&quot;:[0,&quot;outfile&quot;],&quot;type&quot;:[0,&quot;txt&quot;]}]]],&quot;position&quot;:[0,{&quot;left&quot;:[0,749.9543333862634],&quot;top&quot;:[0,725.266848738474]}],&quot;post_job_actions&quot;:[0,{}],&quot;tool_id&quot;:[0,&quot;toolshed.g2.bx.psu.edu/repos/bgruening/text_processing/tp_text_file_with_recurring_lines/9.5+galaxy3&quot;],&quot;tool_shed_repository&quot;:[0,{&quot;changeset_revision&quot;:[0,&quot;ab83aa685821&quot;],&quot;name&quot;:[0,&quot;text_processing&quot;],&quot;owner&quot;:[0,&quot;bgruening&quot;],&quot;tool_shed&quot;:[0,&quot;toolshed.g2.bx.psu.edu&quot;]}],&quot;tool_state&quot;:[0,&quot;{\&quot;token_set\&quot;: [{\&quot;__index__\&quot;: 0, \&quot;line\&quot;: null, \&quot;repeat_select\&quot;: {\&quot;repeat_select_opts\&quot;: \&quot;user\&quot;, \&quot;__current_case__\&quot;: 0, \&quot;times\&quot;: \&quot;1\&quot;}}], \&quot;__page__\&quot;: 0, \&quot;__rerun_remap_job_id__\&quot;: null}&quot;],&quot;tool_uuid&quot;:[0,null],&quot;tool_version&quot;:[0,&quot;9.5+galaxy3&quot;],&q ;: \&quot;CheckM Bin quality\&quot;, \&quot;title\&quot;: null, \&quot;description\&quot;: null, \&quot;xlab\&quot;: null, \&quot;ylab\&quot;: null, \&quot;input\&quot;: {\&quot;__class__\&quot;: \&quot;ConnectedValue\&quot;}}}, {\&quot;__index__\&quot;: 2, \&quot;software_cond\&quot;: {\&quot;software\&quot;: \&quot;custom_content\&quot;, \&quot;__current_case__\&quot;: 46, \&quot;plot_type\&quot;: \&quot;table\&quot;, \&quot;section_name\&quot;: \&quot;CheckM2 Bin quality\&quot;, \&quot;title\&quot;: null, \&quot;description\&quot;: null, \&quot;xlab\&quot;: null, \&quot;ylab\&quot;: null, \&quot;input\&quot;: {\&quot;__class__\&quot;: \&quot;ConnectedValue\&quot;}}}, {\&quot;__index__\&quot;: 3, \&quot;software_cond\&quot;: {\&quot;software\&quot;: \&quot;custom_content\&quot;, \&quot;__current_case__\&quot;: 46, \&quot;plot_type\&quot;: \&quot;table\&quot;, \&quot;section_name\&quot;: \&quot; CoverM Bin coverage\&quot;, \&quot;title\&quot;: null, \&quot;description\&quot;: null, \&quot;xlab\&quot;: null, \&quot;ylab\&quot;: null, \&quot;input\&quot;: {\&quot;__class__\&quot;: \&quot;ConnectedValue\&quot;}}}], \&quot;title\&quot;: \&quot;\&quot;, \&quot;__page__\&quot;: 0, \&quot;__rerun_remap_job_id__\&quot;: null}&quot;],&quot;tool_uuid&quot;:[0,null],&quot;tool_version&quot;:[0,&quot;1.27+galaxy4&quot;],&quot;type&quot;:[0,&quot;tool&quot;],&quot;uuid&quot;:[0,&quot;1ee3626f-8b00-4d4c-a574-e1e310788110&quot;],&quot;when&quot;:[0,null],&quot;workflow_outputs&quot;:[1,[[0,{&quot;label&quot;:[0,&quot;Full MultiQC Report&quot;],&quot;output_name&quot;:[0,&quot;html_report&quot;],&quot;uuid&quot;:[0,&quot;cdf15c25-b19a-43f2-9956-7a3a91ecbac8&quot;]}]]]}]}],&quot;tags&quot;:[1,[[0,&quot;name:FAIRyMAGs&quot;]]],&quot;uuid&quot;:[0,&quot;f985aaad-9023-465c-ad89-6abea077e42f&quot;],&quot;version&quot;:[0,1]}],&quot;workflow_job_input&quot;:[0,{&quot;Trimmed paired reads from grouped samples&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;todo_element_name&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]]]}],&quot;Choose Assembler&quot;:[0,&quot;todo_param_value&quot;],&quot;Trimmed reads&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;todo_element_name&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]]]}],&quot;Run COMEBin&quot;:[0,&quot;todo_param_value&quot;],&quot;CheckM2 Database&quot;:[0,&quot;todo_param_value&quot;]}],&quot;readme&quot;:[0,&quot;# Metagenome-Assembled Genomes (MAGs) Generation\n\nThis workflow generates Metagenome-Assembled Genomes (MAGs) from paired short reads and optional long reads.\nThe use of long reads is only supported for assembly with **metaSPADES**.\nDereplicated MAGs for the complete input sample set are reported.\n\n## Workflow Logic\n\nThe workflow supports assembly using **metaSPADES** and **MEGAHIT**.\nFor binning, it utilizes five different tools: **MetaBAT2, MaxBin2, SemiBin, COMEBin, and CONCOCT**. The resulting bins are then refined using **Binette**, the successor of metaWRAP.\n\n## MAGs Annotation and Quality Control\n\nAfter binning, the resulting MAGs are **dereplicated** across all input samples based on **CheckM2 quality metrics** using **dRep**. The following processing steps are then performed:\n\n* **Quality Control** via QUAST and CheckM/CheckM2\n* **Abundance Estimation** per sample with CoverM\n\nIn previous versions, genome annotation and taxonomic annotation were also performed. This can now be done with dedicated and more comprehensive IWC workflows if needed:\n\n* [MAG Genome Annotation](https://iwc.galaxyproject.org/workflow/mag-genome-annotation-parallel-main)\n* [MAGs Taxonomy Annotation](https://iwc.galaxyproject.org/workflow/mags-taxonomy-annotation-main)\n* [Functional Annotation of Sequences](https://iwc.galaxyproject.org/workflow/functional-annotation-of-sequences-main)\n* [AMR Gene Detection](https://iwc.galaxyproject.org/workflow/amr_gene_detection-main)\n\nAll results are consolidated into a single **MultiQC report**.\n\n## Input Requirements\n\nInput reads must be quality-filtered, with host reads removed.\nSee other MAG workflows in IWC for quality filtering and host removal.\n\n**Short reads:**\n\n* QC: [Short Read QC &amp; Trimming](https://iwc.galaxyproject.org/workflow/short-read-qc-trimming-main)\n* Host removal: [Host Contamination Removal (Short Reads)](https://iwc.galaxyproject.org/workflow/host-contamination-removal-short-reads-main)\n\n**Long reads:**\n\n* QC: [Nanopore Pre-processing](https://iwc.galaxyproject.org/workflow/nanopore-pre-processing-main)\n* Host removal: [Host Contamination Removal (Long Reads)](https://iwc.galaxyproject.org/workflow/host-contamination-removal-long-reads-main)\n\n**Workflow input:**\n\n* **Trimmed reads**: Quality-trimmed reads from individual samples.\n* **Trimmed reads from grouped samples**: These reads need to be grouped based on the desired MAGs generation approach. The tool [fastq_groupmerge](toolshed.g2.bx.psu.edu/repos/iuc/fastq_groupmerge/fastq_groupmerge/1.0.1+galaxy0) can be used to perform the grouping. Long reads and short reads must be grouped using the same logic.\n\n  * **Individual MAGs Generation**: Use the same input as `Trimmed Reads` to generate MAGs per sample.\n  * **Pooled MAGs Generation (Co-assembly/Binning)**: Merge all reads into one file for a fully pooled MAGs approach.\n  * **Grouped MAGs Generation (Co-assembly/Binning)**: Merge samples based on predefined groups.\n  * **Hybrid MAGs Generation**: Combine individual and grouped reads for a mixed approach.\n\n&gt; **Note**: Merging reads can result in large input files, significantly increasing computational demands—especially during assembly and binning, which may require substantial RAM. Our tests with synthetic samples up to **50 GB** showed feasible performance. For larger datasets, we recommend limiting the approach to **individual or pooled MAGs generation**.\n\n## Optional Modifications\n\nSome modifications can be made via the workflow editor for specific use cases:\n\n* Compare binners/bin refinement: add CheckM/CheckM2 to each binner/refiner and compare completeness, contamination, and number of bins.\n* Optionally use DAS Tool instead of Binette (our benchmark showed that Binette produces better MAGs on average).\n* Downstream: compare differential abundance of MAGs in your samples based on metadata using Maaslin2.\n* Downstream: compare your MAGs to a catalogue of MAGs for similar samples. Download desired MAGs from [MGnify genomes](https://www.ebi.ac.uk/metagenomics/browse/genomes) and query your MAGs via the [MGnify API](https://www.ebi.ac.uk/metagenomics/browse/genomes?browse-by=mag-search); download the genomes and compare in Galaxy, e.g., using dRep.&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [0.5] - 2026-04-26\n\n### Added\n\n- **metaSPAdes** now can use optional long reads as input\n\n### Changed\n\n- Removed non-main MAGs steps from the workflow (genome annotation, taxonomy annotation); they are now in separate workflows that can be used optionally downstream of the main workflow\n- Changed COMEBin to be an optional binner\n\n## [0.4] - 2025-10-07\n\n### Changed\n\n- **metaSPAdes** now supports running in single-assembly mode when individual samples are submitted. Previously, it always performed co-assembly, which is the default tool setting.\n- All tools have been updated to their latest versions.\n\n### Added\n\n- **bakta**, **quast** (for the bins), **coverM** results are joined into one overview table each\n- For **dRep** also the clustering results are generated.\n- Workflow annotations.\n\n## [0.3] - 2025-06-09\n\n### Automatic update\n- `toolshed.g2.bx.psu.edu/repos/bgruening/text_
