PRJNA1425252\nPRJEB1417616\n````\n\nOther input options are booleans related to the *pysradb* tool functioning and can be explained as in its tool help:\n\n- **Include assay type in metadata**&amp;emsp;&amp;emsp;&amp;emsp;&amp;emsp;Include assay type in output\n- **Include sample attributes in metadata**&amp;emsp;&amp;emsp;&amp;emsp;&amp;emsp;Should sample_attribute be included\n- **Display detailed metadata table**&amp;emsp;&amp;emsp;&amp;emsp;&amp;emsp;Display detailed metadata table\n- **Expand sample attributes in metadata**&amp;emsp;&amp;emsp;&amp;emsp;&amp;emsp;Should sample_attribute be expanded\n\n\n## Outputs\n\nThere are 3 main outputs:\n\n- Data collection for the SRA metadata table of input BioProject ID(s)\n- Data collection for Paired End FASTQ files\n- Data collection for Single End FASTQ files&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [0.2] - 2026-07-06\n\n### Automatic update\n- `toolshed.g2.bx.psu.edu/repos/iuc/sra_tools/fasterq_dump/3.1.1+galaxy0` was updated to `toolshed.g2.bx.psu.edu/repos/iuc/sra_tools/fasterq_dump/3.1.1+galaxy1`\n\n## [0.1] - 2026-03-23\n\n- Added workflow&quot;],&quot;diagrams&quot;:[0,&quot;# Workflow diagrams\n\n## Metadata and Sequences from BioProject IDs\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ BioProject IDs\&quot;]@{ shape: doc }\n1[\&quot;ℹ️ Include assay type in metadata\&quot;]@{ shape: lean-l }\n2[\&quot;ℹ️ Include sample attributes in metadata\&quot;]@{ shape: lean-l }\n3[\&quot;ℹ️ Display detailed metadata table\&quot;]@{ shape: lean-l }\n4[\&quot;ℹ️ Expand sample attributes in metadata\&quot;]@{ shape: lean-l }\n5[\&quot;Separate BioProject IDs\&quot;]@{ shape: process }\n0 --&gt; 5\n6[\&quot;Relabel the separated BioProject IDs\&quot;]@{ shape: process }\n0 --&gt; 6\n5 --&gt; 6\n7[\&quot;Add BioProject IDs as parameters\&quot;]@{ shape: process }\n6 --&gt; 7\n8[\&quot;Metadata From BioProject IDs\&quot;]@{ shape: process }\n1 --&gt; 8\n2 --&gt; 8\n3 --&gt; 8\n4 --&gt; 8\n7 --&gt; 8\n9[\&quot;Get run_a
