[0,&quot;0.1&quot;],&quot;license&quot;:[0,&quot;MIT&quot;],&quot;name&quot;:[0,&quot;HyPhy: Compare&quot;],&quot;readme&quot;:[0,&quot;# HyPhy: Compare\n\n## Description\nThis workflow consumes the per-gene codon-aware alignments and IQ-TREE phylogenies produced by the HyPhy preprocessing workflow and compares two branch classes: Foreground branches defined by a user-provided list, and all remaining branches (Reference). It labels each tree with the HyPhy Annotate tool, then runs HyPhy Contrast-FEL (CFEL) and HyPhy RELAX on every gene to quantify site-wise and branch-wise selection differences.\n\n## Inputs\n1. Codon-aware alignments (collection, FASTA). Output of the preprocessing workflow; one alignment per gene.\n2. IQ-TREE phylogenies (collection, Newick). Matching tree collection output from the preprocessing workflow, with identical element identifiers.\n3. Foreground identifiers (dataset). Plain-text list of cleaned sequence names. Any branch whose label matches an entry becomes Foreground; all others become Reference.\n\n## Outputs\n1. Labeled trees (collection, Newick). Trees with {Foreground} or {Reference} tags suitable for downstream HyPhy tools.\n2. HyPhy CFEL results (collection, JSON). Site-level contrast of nonsynonymous vs synonymous rates between the two branch sets.\n3. HyPhy RELAX results (collection, JSON). Gene-level test for relaxation or intensification of selection on the Foreground branches.\n\n## Key Tools\n1. HyPhy Annotate (label-tree) – Marks Foreground vs Reference branches based on the identifier list.\n2. HyPhy CFEL – Site-level contrast between branch sets.\n3. HyPhy RELAX – Tests for relaxed/intensified selection between Foreground and Reference.\n\n## Recommended Use\nConsumes external codon-aware alignments and IQ-TREE phylogenies; it assumes those inputs already meet specific requirements (no internal stops, minimal recombination, matched element IDs). If you generated inputs with the HyPhy preprocessing workflow, all the same onal branch-comparison analyses. Inspired by the [veg/capheine](https://github.com/veg/capheine) Nextflow implementation, version 1.1.0.\n\n**Inputs:**\n- **Reference CDS FASTA** (required): Multi-gene CDS reference file (e.g., from NCBI)\n- **Unaligned sequences** (required): List collection of FASTA files, one per sample\n- **Foreground regexp** (optional): Regular expression to match foreground sequence names for branch labeling\n- **Foreground list** (optional): Dataset with cleaned sequence identifiers for foreground branches\n\n**Behavior:**\n- If neither regex nor list is provided → runs Core workflow only\n- If regex is provided → derives foreground set from matches and runs Compare module\n- If only list is provided → uses it directly for Compare module\n- If both are provided → regex takes precedence, list is ignored\n\n**Outputs:**\n\n*Core outputs (always produced):*\n- Codon-aware alignments (collection, FASTA)\n- Gene trees (collection, Newick)\n- HyPhy MEME results (collection, JSON)\n- HyPhy PRIME results (collection, JSON)\n- HyPhy BUSTED results (collection, JSON)\n- HyPhy FEL results (collection, JSON)\n\n*Compare outputs (when foreground info provided):*\n- Labeled trees (collection, Newick)\n- HyPhy CFEL results (collection, JSON)\n- HyPhy RELAX results (collection, JSON)\n\n### 2. HyPhy Core (`hyphy-core.ga`)\n\nSubworkflow for codon-aware preprocessing and core selection analyses.\n\n### 3. HyPhy Compare (`hyphy-compare.ga`)\n\nSubworkflow for branch-comparison analyses (CFEL and RELAX).\n\n### 4. HyPhy Preprocessing (`hyphy-preprocessing.ga`)\n\nSubworkflow for sequence cleanup and codon-aware alignment.\n\n## Test Data\n\nThe `test-data/` directory contains:\n- `denv1_ref_cds.fasta`: Reference coding sequences from Dengue virus 1\n- `foreground_seqs_list.tabular`: Example foreground sequence identifiers\n- `unaligned_seqs/`: Directory with 39 unaligned FASTA files for testing\n\n## Running Tests\n\nTests are defined in `capheine-core-and-compare-tests.yml` with four scenarios:\n1. Core only (reference CDS + unaligned sequences)\n2. Core + Compare with regex (no foreground list)\n3. Core + Compare with foreground list (no regex)\n4. Core + Compare with all inputs (regex takes precedence)\n\n## References\n\n- HyPhy: [https://github.com/veg/hyphy](https://github.com/veg/hyphy)\n- CAPHEINE Nextflow: [https://github.com/veg/capheine](https://github.com/veg/capheine)\n&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [0.1] - 2026-02-26\n\n### Added\n- Initial release of HyPhy workflows for comparative genomics\n- CAPHEINE: Combined HyPhy Core and Compare workflow\n  - Orchestrates complete HyPhy pipeline with codon-aware preprocessing\n  - Optional branch-comparison analyses (CFEL and RELAX)\n  - Supports foreground/background branch labeling via regex or explicit list\n- HyPhy Core subworkflow\n  - Codon-aware preprocessing and alignment\n  - Core selection analyses (MEME, PRIME, BUSTED, FEL)\n- HyPhy Compare subworkflow\n  - Branch-comparison analyses (CFEL and RELAX)\n- HyPhy Preprocessing subworkflow\n  - Sequence cleanup and codon-aware alignment\n- Comprehensive test suite with 4 scenarios for CAPHEINE workflow\n- Test data including DENV1 reference CDS and 39 unaligned sequences\n&quot;],&quot;diagrams&quot;:[0,&quot;# Workflow diagrams\n\n## HyPhy: Compare\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ Codon-aware alignment(s)\&quot;]@{ shape: docs }\n1[\&quot;ℹ️ Phylogenetic tree(s)\&quot;]@{ shape: docs }\n2[\&quot;ℹ️ Foreground Sequences List\&quot;]@{ shape: doc }\n3[\&quot;Clean Foreground Sequences List\&quot;]@{ shape: process }\n2 --&gt; 3\n4[\&quot;Label Foreground Branches\&quot;]@{ shape: process }\n1 --&gt; 4\n3 --&gt; 4\n5[\&quot;Label Reference Branches\&quot;]@{ shape: process }\n4 --&gt; 5\n3 --&gt; 5\n6[\&quot;RELAX\&quot;]@{ shape: process }\n0 --&gt; 6\n5 --&gt; 6\n7[\&quot;Contrast-FEL\&quot;]@{ shape: process }\n0 --&gt; 7\n5 --&gt; 7\n```\n&quot;],&quot;diagram_svg&quot;:[0,null],
