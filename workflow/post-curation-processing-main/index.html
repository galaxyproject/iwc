signs chromosome names, renames and reorients hap2 to match hap1, then generates QC outputs including Compleasm, Pretext maps, telomere analysis, and coverage tracks.&quot;],&quot;comments&quot;:[1,[]],&quot;creator&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;https://orcid.org/0000-0001-6421-3484&quot;],&quot;name&quot;:[0,&quot;Delphine Lariviere&quot;]}],[0,{&quot;class&quot;:[0,&quot;Organization&quot;],&quot;name&quot;:[0,&quot;IWC&quot;],&quot;url&quot;:[0,&quot;https://github.com/galaxyproject/iwc&quot;]}]]],&quot;format-version&quot;:[0,&quot;0.1&quot;],&quot;license&quot;:[0,&quot;MIT&quot;],&quot;release&quot;:[0,&quot;0.1&quot;],&quot;name&quot;:[0,&quot;Post-curation assembly processing and evaluation&quot;],&quot;readme&quot;:[0,&quot;# Post-curation assembly processing and evaluation\n\nThis workflow performs post-curation processing and evaluation for VGP assemblies. It takes a curated AGP file and combined haplotype FASTA, splits by haplotype, applies curation, assigns chromosome names, renames and reorients hap2 to match hap1, and generates QC outputs including Compleasm results, Pretext maps, telomere analysis, and coverage tracks.\n\n## Inputs\n\n### Required Inputs\n\n1. **Species Name** [text] - Species identifier\n2. **Assembly Name** [text] - Assembly identifier\n3. **Curated AGP file** [tabular] - Generated by PretextView after manual curation (PretextView AGP v2.1 format with haplotype labels)\n4. **Fasta file with both haplotypes** [fasta] - Generated by the pre-curation workflow, containing both haplotypes in a single file\n5. **Database For Compleasm Lineages** [text] - OrthoDB database version used by Compleasm (e.g., v5). Default: v5\n6. **Lineage for Compleasm Genes** [text] - Compleasm lineage dataset (e.g., vertebrata_odb10, primates_odb10). Default: vertebrata_odb10\n7. **Hi-C reads** [list:paired] - Paired collection of Hi-C sequencing data\n8. **PacBio reads** [list] - Collection of PacBio HiFi reads\n\n### Processing Options\n\n9. **Genome larger than 10GB** [boolean] - Use BWA-MEM instead of BWA-MEM2 for read alignment. Recommended for genomes larger than 10GB. Default: false\n10. **Expected Genome Size** [integer, optional] - Expected genome size in bp. Required for NG* statistics in the Assembly statistics output.\n11. **Generate Gene tracks with Compleasm?** [boolean] - Enable/disable Compleasm gene annotation tracks\n12. **Trim the Hi-C data?** [boolean] - Trim 5 bases at the beginning of each read. Use with Arima Hi-C data if the Hi-C map looks \&quot;noisy\&quot;\n13. **Remove duplicated Hi-C reads?** [boolean] - Remove PCR duplicates from Hi-C data\n14. **Remove adapters from HiFi reads?** [boolean] - Select no if using HiFi reads trimmed in a previous workflow\n15. **Generate high resolution Hi-C maps?** [boolean] - Generate high resolution Pretext maps\n\n### Analysis Parameters\n\n16. **Canonical telomeric pattern** [text] - Default: TTAGGG (for vertebrate genomes)\n17. **Telomere patterns to explore** [text] - Telomere repeat patterns to search for (comma-separated, IUPAC allowed)\n18. **Minimum Mapping Quality** [integer] - Minimum mapping score for Hi-C alignments. Default: 10\n19. **Bin Size for BigWig files** [integer] - Bin size for coverage tracks. Default: 100\n\n### Haplotype Naming\n\n20. **Name Haplotype 1** [text] - Label for haplotype 1 (used to prefix output names)\n21. **Name Haplotype 2** [text] - Label for haplotype 2 (used to prefix output names)\n\n## Outputs\n\n### Assembly Summary\n\n- **Assembly information** - Assembly summary information\n- **Assembly statistics** - Combined gfastats assembly statistics (includes NG* if Expected Genome Size is provided)\n\n### Curation Results\n\n- **Corrected AGP** - AGP file with corrections applied\n- **Curated Hap1** - Curated haplotype 1 FASTA\n- **Curated Hap2** - Curated haplotype 2 FASTA\n- **Compressed Curated Hap1** - Curated haplotype 1 FASTA (gzip-compressed)\n- **Compressed Curated Hap2** - Curated haplotype 2 FASTA (gzip-compressed)\n- **Hap1 AGP** - Haplotype 1 AGP\n- **Hap2 Unlocs no hap dups AGP** - Haplotype 2 AGP without haplotypic duplicates in unlocalized scaffolds\n- **Hap1 Unlocs no hap dups AGP** - Haplotype 1 AGP without haplotypic duplicates in unlocalized scaffolds\n- **Hap1 Unlocs** - Haplotype 1 unlocalized scaffolds\n- **Hap2 Unlocs** - Haplotype 2 unlocalized scaffolds\n- **Hap1 Haplotigs** - Haplotype 1 haplotigs\n- **Hap2 AGP** - Haplotype 2 AGP (primary AGP for haplotype 2)\n\n### Chromosome Assignment\n\n- **Chromosome mapping Hap1** - Scaffold to chromosome mapping for haplotype 1 (SUPER_N naming)\n- **Chromosome mapping Hap2** - Scaffold to chromosome mapping for haplotype 2\n- **Chromosome level Hap2** - Chromosome-level haplotype 2 FASTA\n- **Chromosome File Hap1** - List of scaffolds assigned as chromosomes in haplotype 1\n- **Chromosome File Hap2** - List of scaffolds assigned as chromosomes in haplotype 2\n- **Chromosome Hap1 Csv** - Haplotype 1 chromosome assignment table (CSV)\n- **Chromosome Hap2 Csv** - Haplotype 2 chromosome assignment table (CSV)\n- **Percentage of Sequence Assigned to Chromosomes Hap1** - Fraction of haplotype 1 sequence assigned to chromosomes (relative to total assembly length)\n- **Percentage of Sequence Assigned to Chromosomes Hap2** - Fraction of haplotype 2 sequence assigned to chromosomes (relative to total assembly length)\n- **Sequence Assignment Stats** - Combined chromosome assignment statistics for both haplotypes\n\n### Rename and Reorient\n\n- **Mashmap for Hap2 sync** - Mashmap alignment between haplotypes at chromosome level (from curation subworkflow)\n- **Mashmap Chromosome level** - Mashmap alignment between curated haplotypes\n- **Hap1 Hap2 orientation mapping** - Orientation mapping between haplotypes\n- **Reorientation and renaming instructions** - Instructions for renaming and reorienting hap2\n- **Sequences missing in mashmap** - Sequences not aligned by mashmap\n\n### Visualization\n\n- **JBrowse2 without Gene tracks** - JBrowse2 visualization without gene annotation tracks\n- **JBrowse2 with Gene tracks** - JBrowse2 visualization with Compleasm gene annotation tracks\n- **Hi-C maps for each haplotype** - Combined Hi-C contact maps (MAPQ filtered)\n- **Hi-C maps for each haplotype - Multimapping** - Combined Hi-C contact maps (multimapping)\n\n### Haplotype 1 QC\n\n- **Hap1 Telomere Report** - Telomere analysis report\n- **Hap1 terminal telomeres** - Terminal telomere positions\n- **Hap1 P telomeres BED** - P-arm telomere positions\n- **Hap1 Q telomeres BED** - Q-arm telomere positions\n- **Hap1 Gaps BED** - Assembly gaps BED file\n- **Hap1 Gaps BEDgraph** - Assembly gaps bedgraph\n- **Hap1 Genes track** - Compleasm gene annotation track\n- **Hap1 Compleasm Summary** - Compleasm completeness summary\n- **Hap1 miniprot** - Miniprot protein-to-genome alignments\n- **Hap1 BigWig Coverage** - PacBio read coverage track\n- **Hap1 Coverage Gaps Track** - Coverage gaps track\n- **Hap1 Coverage gap BED for JBrowse2** - Coverage gaps BED for JBrowse2\n- **Hap1 Merged HiFi Alignments** - Merged PacBio HiFi alignments\n- **Hap1 Merged Hi-C Alignments on Curated Assembly** - Merged Hi-C alignments\n- **Hap1 Hi-C alignments on Curated Assembly** - Hi-C alignments\n- **Hap1 Hi-C duplication stats on Curated Assembly** - Hi-C duplication statistics\n- **Hap1 Hi-C duplication stats on Curated Assembly: Raw** - Raw duplication statistics\n- **Hap1 Hi-C duplication stats on Curated Assembly: MultiQC** - MultiQC duplication report\n- **Hap1 Pairtools MultiQC Stats on Curated Assembly** - Pairtools MultiQC statistics\n- **Hap1 Pairtools MultiQC on Curated Assembly: Plots** - Pairtools MultiQC plots\n- **Hap1 Pretext All tracks** - Pretext map with all tracks (MAPQ filtered)\n- **Hap1 Pretext All tracks - Multimapping** - Pretext map with all tracks (multimapping)\n- **Hap1 Pretext Snapshot** - Pretext snapshot for haplotype 1\n- **Ha uot;{\&quot;column1\&quot;: \&quot;1\&quot;, \&quot;column2\&quot;: \&quot;1\&quot;, \&quot;empty_string_filler\&quot;: \&quot;0\&quot;, \&quot;header\&quot;: true, \&quot;ignore_case\&quot;: false, \&quot;infile1\&quot;: {\&quot;__class__\&quot;: \&quot;ConnectedValue\&quot;}, \&quot;infile2\&quot;: {\&quot;__class__\&quot;: \&quot;ConnectedValue\&quot;}, \&quot;jointype\&quot;: \&quot; \&quot;, \&quot;__page__\&quot;: 0, \&quot;__rerun_remap_job_id__\&quot;: null}&quot;],&quot;tool_uuid&quot;:[0,null],&quot;tool_version&quot;:[0,&quot;9.5+galaxy3&quot;],&quot;type&quot;:[0,&quot;tool&quot;],&quot;uuid&quot;:[0,&quot;56f2603f-78a5-4e40-b953-942248b0b4ed&quot;],&quot;when&quot;:[0,null],&quot;workflow_outputs&quot;:[1,[[0,{&quot;label&quot;:[0,&quot;Sequence Assignment Stats&quot;],&quot;output_name&quot;:[0,&quot;output&quot;],&quot;uuid&quot;:[0,&quot;543898e8-1045-49e5-92e1-1c50448cbc68&quot;]}]]]}]}],&quot;tags&quot;:[1,[[0,&quot;VGP&quot;],[0,&quot;assembly&quot;],[0,&quot;post-curation&quot;]]],&quot;uuid&quot;:[0,&quot;b4bdaa1c-d38a-425d-a44f-d087dc0f5e48&quot;],&quot;version&quot;:[0,2]}],&quot;workflow_job_input&quot;:[0,{&quot;Species Name&quot;:[0,&quot;todo_param_value&quot;],&quot;Assembly Name&quot;:[0,&quot;todo_param_value&quot;],&quot;Curated AGP file&quot;:[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}],&quot;Fasta file with both haplotypes&quot;:[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}],&quot;Hi-C reads&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;todo_element_name&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]]]}],&quot;PacBio reads&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;todo_element_name&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]]]}]}],&quot;readme&quot;:[0,&quot;# Post-curation assembly processing and evaluation\n\nThis workflow performs post-curation processing and evaluation for VGP assemblies. It takes a curated AGP file and combined haplotype FASTA, splits by haplotype, applies curation, assigns chromosome names, renames and reorients hap2 to match hap1, and generates QC outputs including Compleasm results, Pretext maps, telomere analysis, and coverage tracks.\n\n## Inputs\n\n### Required Inputs\n\n1. **Species Name** [text] - Species identifier\n2. **Assembly Name** [text] - Assembly identifier\n3. **Curated AGP file** [tabular] - Generated by PretextView after manual curation (PretextView AGP v2.1 format with haplotype labels)\n4. **Fasta file with both haplotypes** [fasta] - Generated by the pre-curation workflow, containing both haplotypes in a single file\n5. **Database For Compleasm Lineages** [text] - OrthoDB database version used by Compleasm (e.g., v5). Default: v5\n6. **Lineage for Compleasm Genes** [text] - Compleasm lineage dataset (e.g., vertebrata_odb10, primates_odb10). Default: vertebrata_odb10\n7. **Hi-C reads** [list:paired] - Paired collection of Hi-C sequencing data\n8. **PacBio reads** [list] - Collection of PacBio HiFi reads\n\n### Processing Options\n\n9. **Genome larger than 10GB** [boolean] - Use BWA-MEM instead of BWA-MEM2 for read alignment. Recommended for genomes larger than 10GB. Default: false\n10. **Expected Genome Size** [integer, optional] - Expected genome size in bp. Required for NG* statistics in the Assembly statistics output.\n11. **Generate Gene tracks with Compleasm?** [boolean] - Enable/disable Compleasm gene annotation tracks\n12. **Trim the Hi-C data?** [boolean] - Trim 5 bases at the beginning of each read. Use with Arima Hi-C data if the Hi-C map looks \&quot;noisy\&quot;\n13. **Remove duplicated Hi-C reads?** [boolean] - Remove PCR duplicates from Hi-C data\n14. **Remove adapters from HiFi reads?** [boolean] - Select no if using HiFi reads trimmed in a previous workflow\n15. **Generate high resolution Hi-C maps?** [boolean] - Generate high resolution Pretext maps\n\n### Analysis Parameters\n\n16. **Canonical telomeric pattern** [text] - Default: TTAGGG (for vertebrate genomes)\n17. **Telomere patterns to explore** [text] - Telomere repeat patterns to search for (comma-separated, IUPAC allowed)\n18. **Minimum Mapping Quality** [integer] - Minimum mapping score for Hi-C alignments. Default: 10\n19. **Bin Size for BigWig files** [integer] - Bin size for coverage tracks. Default: 100\n\n### Haplotype Naming\n\n20. **Name Haplotype 1** [text] - Label for haplotype 1 (used to prefix output names)\n21. **Name Haplotype 2** [text] - Label for haplotype 2 (used to prefix output names)\n\n## Outputs\n\n### Assembly Summary\n\n- **Assembly information** - Assembly summary information\n- **Assembly statistics** - Combined gfastats assembly statistics (includes NG* if Expected Genome Size is provided)\n\n### Curation Results\n\n- **Corrected AGP** - AGP file with corrections applied\n- **Curated Hap1** - Curated haplotype 1 FASTA\n- **Curated Hap2** - Curated haplotype 2 FASTA\n- **Compressed Curated Hap1** - Curated haplotype 1 FASTA (gzip-compressed)\n- **Compressed Curated Hap2** - Curated haplotype 2 FASTA (gzip-compressed)\n- **Hap1 AGP** - Haplotype 1 AGP\n- **Hap2 Unlocs no hap dups AGP** - Haplotype 2 AGP without haplotypic duplicates in unlocalized scaffolds\n- **Hap1 Unlocs no hap dups AGP** - Haplotype 1 AGP without haplotypic duplicates in unlocalized scaffolds\n- **Hap1 Unlocs** - Haplotype 1 unlocalized scaffolds\n- **Hap2 Unlocs** - Haplotype 2 unlocalized scaffolds\n- **Hap1 Haplotigs** - Haplotype 1 haplotigs\n- **Hap2 AGP** - Haplotype 2 AGP (primary AGP for haplotype 2)\n\n### Chromosome Assignment\n\n- **Chromosome mapping Hap1** - Scaffold to chromosome mapping for haplotype 1 (SUPER_N naming)\n- **Chromosome mapping Hap2** - Scaffold to chromosome mapping for haplotype 2\n- **Chromosome level Hap2** - Chromosome-level haplotype 2 FASTA\n- **Chromosome File Hap1** - List of scaffolds assigned as chromosomes in haplotype 1\n- **Chromosome File Hap2** - List of scaffolds assigned as chromosomes in haplotype 2\n- **Chromosome Hap1 Csv** - Haplotype 1 chromosome assignment table (CSV)\n- **Chromosome Hap2 Csv** - Haplotype 2 chromosome assignment table (CSV)\n- **Percentage of Sequence Assigned to Chromosomes Hap1** - Fraction of haplotype 1 sequence assigned to chromosomes (relative to total assembly length)\n- **Percentage of Sequence Assigned to Chromosomes Hap2** - Fraction of haplotype 2 sequence assigned to chromosomes (relative to total assembly length)\n- **Sequence Assignment Stats** - Combined chromosome assignment statistics for both haplotypes\n\n### Rename and Reorient\n\n- **Mashmap for Hap2 sync** - Mashmap alignment between haplotypes at chromosome level (from curation subworkflow)\n- **Mashmap Chromosome level** - Mashmap alignment between curated haplotypes\n- **Hap1 Hap2 orientation mapping** - Orientation mapping between haplotypes\n- **Reorientation and renaming instructions** - Instructions for renaming and reorienting hap2\n- **Sequences missing in mashmap** - Sequences not aligned by mashmap\n\n### Visualization\n\n- **JBrowse2 without Gene tracks** - JBrowse2 visualization without gene annotation tracks\n- **JBrowse2 with Gene tracks** - JBrowse2 visualization with Compleasm gene annotation tracks\n- **Hi-C maps for each haplotype** - Combined Hi-C contact maps (MAPQ filtered)\n- **Hi-C maps for each haplotype - Multimapping** - Combined Hi-C contact maps (multimapping)\n\n### Haplotype 1 QC\n\n- **Hap1 Telomere Report** - Telomere analysis report\n- **Hap1 terminal telomeres** - Terminal telomere positions\n- **Hap1 P telomeres BED** - P-arm telomere positions\n- **Hap1 Q telomeres BED** - Q-arm telomere positions\n- **Hap1 Gaps BED** - Assembly gaps BED file\n- **Hap1 Gaps BEDgraph** - Assembly gaps bedgraph\n- **Hap1 Genes track** - Compleasm gene annotation track\n- **Hap1 Compleasm Summary** - Compleasm completeness summary\n- **Hap1 miniprot** - Miniprot protein-to-genome alignments\n- **Hap1 BigWig Coverage** - PacBio read coverage track\n- **Hap1 Coverage Gaps Track** - Coverage gaps track\n- **Hap1 Coverage gap BED for JBrowse2** - Coverage gaps BED for JBrowse2\n- **Hap1 Merged HiFi Alignments** - Merged PacBio HiFi alignments\n- **Hap1 Merged Hi-C Alignments on Curated Assembly** - Merged Hi-C alignments\n- **Hap1 Hi-C alignments on Curated Assembly** - Hi-C alignments\n- **Hap1 Hi-C duplication stats on Curated Assembly** - Hi-C duplication statistics\n- **Hap1 Hi-C duplication stats on Curated Assembly: Raw** - Raw duplication statistics\n- **Hap1 Hi-C duplication stats on Curated Assembly: MultiQC** - MultiQC duplication report\n- **Hap1 Pairtools MultiQC Stats on Curated Assembly** - Pairtools MultiQC statistics\n- **Hap1 Pairtools MultiQC on Curated Assembly: Plots** - Pairtools MultiQC plots\n- **Hap1 Pretext All tracks** - Pretext map with all tracks (MAPQ filtered)\n- **Hap1 Pretext All tracks - Multimapping** - Pretext map with all tracks (multimapping)\n- **Hap1 Pretext Snapshot** - Pretext snapshot for haplotype 1\n- **Hap1 Pretext Snapshot - Multimapping** - Pretext snapshot with tracks (multimapping)\n\n### Haplotype 2 QC\n\n- **Hap2 Telomere Report** - Telomere analysis report\n- **Hap2 terminal telomeres** - Terminal telomere positions\n- **Hap2 P telomeres BED** - P-arm telomere positions\n- **Hap2 Q telomeres BED** - Q-arm telomere positions\n- **Hap2 Gaps BED** - Assembly gaps BED file\n- **Hap2 Gaps BEDgraph** - Assembly gaps bedgraph\n- **Hap2 Genes track** - Compleasm gene annotation track\n- **Hap2 Compleasm Summary** - Compleasm completeness summary\n- **Hap2 miniprot** - Miniprot protein-to-genome alignments\n- **Hap2 BigWig Coverage** - PacBio read coverage track\n- **Hap2 Coverage Gaps Track** - Coverage gaps track\n- **Hap2 Coverage gap BED for JBrowse2** - Coverage gaps BED for JBrowse2\n- **Hap2 Merged HiFi Alignments** - Merged PacBio HiFi alignments\n- **Hap2 Merged Hi-C Alignments on Curated Assembly** - Merged Hi-C alignments\n- **Hap2 Hi-C alignments on Curated Assembly** - Hi-C alignments\n- **Hap2 Hi-C duplication stats on Curated Assembly** - Hi-C duplication statistics\n- **Hap2 Hi-C duplication stats on Curated Assembly: Raw** - Raw duplication statistics\n- **Hap2 Hi-C duplication stats on Curated Assembly: MultiQC** - MultiQC duplication report\n- **Hap2 Pairtools MultiQC Stats on Curated Assembly** - Pairtools MultiQC statistics\n- **Hap2 Pairtools MultiQC on Curated Assembly: Plots** - Pairtools MultiQC plots\n- **Hap2 Pretext All tracks** - Pretext map with all tracks (MAPQ filtered)\n- **Hap2 Pretext All tracks - Multimapping** - Pretext map with all tracks (multimapping)\n- **Hap2 Pretext Snapshot** - Pretext snapshot for haplotype 2\n- **Hap2 Pretext Snapshot - Multimapping** - Pretext snapshot with tracks (multimapping)\n&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [0.1] - 2026-03-18\n\n### Added\n- Initial release of the Post Curation workflow\n- Splits curated AGP and combined FASTA by haplotype\n- Assigns chromosome names based on scaffold size\n- Renames and reorients hap2 chromosomes to match hap1 using mashmap\n- Generates Compleasm gene annotation tracks (separate inputs for OrthoDB database version and lineage)\n- Generates Hi-C contact maps (Pretext) with coverage, telomere, gap, and gene tracks\n- Produces combined gfastats Assembly statistics output, including NG* metrics when an expected genome size is provided\n- Exports per-haplotype chromosome assignment tables as CSV\n- Supports sex chromosome labeling (Z/W)\n- Optional Hi-C read trimming, duplicate removal, and HiFi adapter removal\n- Toggles between BWA-MEM2 and BWA-MEM aligners (BWA-MEM for genomes larger than 10 GB)\n&quot;],&quot;diagrams&quot;:[0,&quot;# Workflow diagrams\n\n## Post-curation assembly processing and evaluation\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ Species Name\&quot;]@{ shape: lean-l }\n1[\&quot;ℹ️ Assembly Name\&quot;]@{ shape: lean-l }\n2[\&quot;ℹ️ Curated AGP file\&quot;]@{ shape: doc }\n3[\&quot;ℹ️ Fasta file with both haplotypes\&quot;]@{ shape: doc }\n4[\&quot;ℹ️ Genome larger than 10GB\&quot;]@{ shape: lean-l }\n5[\&quot;ℹ️ Expected Genome Size\&quot;]@{ shape: lean-l }\n6[\&quot;ℹ️ Generate Gene tracks with Compleasm?\&quot;]@{ shape: lean-l }\n7[\&quot;ℹ️ Database For Compleasm Lineages\&quot;]@{ shape: lean-l }\n8[\&quot;ℹ️ Lineage for Compleasm Genes\&quot;]@{ shape: lean-l }\n9[\&quot;ℹ️ Hi-C reads\&quot;]@{ shape: docs }\n10[\&quot;ℹ️ Trim the Hi-C data?\&quot;]@{ shape: lean-l }\n11[\&quot;ℹ️ Remove duplicated Hi-C reads?\&quot;]@{ shape: lean-l }\n12[\&quot;ℹ️ PacBio reads\&quot;]@{ shape: docs }\n13[\&quot;ℹ️ Remove adapters from HiFi reads?\&quot;]@{ shape: lean-l }\n14[\&quot;ℹ️ Canonical telomeric pattern\&quot;]@{ shape: lean-l }\n15[\&quot;ℹ️ Telomere patterns to explore\&quot;]@{ shape: lean-l }\n16[\&quot;ℹ️ Minimum Mapping Quality\&quot;]@{ shape: lean-l }\n17[\&quot;ℹ️ Bin Size for BigWig files\&quot;]@{ shape: lean-l }\n18[\&quot;ℹ️ Generate high resolution Hi-C maps?\&quot;]@{ shape: lean-l }\n19[\&quot;ℹ️ Name Haplotype 1\&quot;]@{ shape: lean-l }\n20[\&quot;ℹ️ Name Haplotype 2\&quot;]@{ shape: lean-l }\n21[\&quot;Assembly informations\&quot;]@{ shape: process }\n0 --&gt; 21\n1 --&gt; 21\n22[\&quot;🛠️ Curation Processing\&quot;]@{ shape: subprocess }\n3 --&gt; 22\n2 --&gt; 22\n23[\&quot;True when no gene track generated\&quot;]@{ shape: process }\n6 --&gt; 23\n24[\&quot;Trim Hi-C reads 2\&quot;]@{ shape: process }\n9 --&gt; 24\n10 --&gt; 24\n25[\&quot;Remove adapters from Hifi reads\&quot;]@{ shape: process }\n12 --&gt; 25\n13 --&gt; 25\n26[\&quot;Header Hap1\&quot;]@{ shape:
