ined area in brightfield histological images (MT, IHC). It accepts whole slides or pre-cropped ROIs.&quot;],&quot;comments&quot;:[1,[[0,{&quot;child_steps&quot;:[1,[[0,15]]],&quot;color&quot;:[0,&quot;none&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Generate ROIs of Stained Region&quot;]}],&quot;id&quot;:[0,3],&quot;position&quot;:[1,[[0,1367.6],[0,0]]],&quot;size&quot;:[1,[[0,444],[0,244]]],&quot;type&quot;:[0,&quot;frame&quot;]}],[0,{&quot;child_steps&quot;:[1,[[0,27],[0,28],[0,29]]],&quot;color&quot;:[0,&quot;pink&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Final Results - Tabular File&quot;]}],&quot;id&quot;:[0,5],&quot;position&quot;:[1,[[0,2841.7000000000003],[0,493.6]]],&quot;size&quot;:[1,[[0,809],[0,490]]],&quot;type&quot;:[0,&quot;frame&quot;]}],[0,{&quot;child_steps&quot;:[1,[[0,16],[0,18],[0,25],[0,26],[0,19],[0,20],[0,22],[0,23],[0,1]]],&quot;color&quot;:[0,&quot;green&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Quantification and Sanitation Steps for Outfile&quot;]}],&quot;id&quot;:[0,4],&quot;position&quot;:[1,[[0,1408],[0,268.4]]],&quot;size&quot;:[1,[[0,1377],[0,501]]],&quot;type&quot;:[0,&quot;frame&quot;]}],[0,{&quot;child_steps&quot;:[1,[[0,13]]],&quot;color&quot;:[0,&quot;black&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Stained Area Detection&quot;]}],&quot;id&quot;:[0,2],&quot;position&quot;:[1,[[0,1102.7],[0,268]]],&quot;size&quot;:[1,[[0,290],[0,501]]],&quot;type&quot;:[0,&quot;frame&quot;]}],[0,{&quot;child_steps&quot;:[1,[[0,2],[0,12],[0,24],[0,4],[0,6],[0,7],[0,9],[0,10],[0,14],[0,17],[0,21]]],&quot;color&quot;:[0,&quot;none&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Total Area Computing&quot;]}],&quot;id&quot;:[0,1],&quot;position&quot;:[1,[[0,0.7999999999999999],[0,822.3000000000001]]],&quot;size&quot;:[1,[[0,2789.4],[0,503]]],&quot;type&quot;:[0,&quot;frame&quot;]}],[0,{&quot;child_steps&quot;:[1,[[0,5],[0,8],[0,11],[0,3],[0,0]]],&quot;color&quot;:[0,&quot;turquoise&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Image Preparation&quot;]}],&quot;id&quot;:[0,0],&quot;position&quot;:[1,[[0,0],[0,266.5]]],&quot;size&quot;:[1,[[0,1084],[0,502]]],&quot;type&quot;:[0,&quot;frame&quot;]}]]],&quot;creator&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;0000-0002-5857-1477&quot;],&quot;name&quot;:[0,&quot;Diana Chiang Jurado&quot;]}]]],&quot;format-version&quot;:[0,&quot;0.1&quot;],&quot;license&quot;:[0,&quot;CC-BY-4.0&quot;],&quot;name&quot;:[0,&quot;Histological Staining Area Quantification&quot;],&quot;readme&quot;:[0,&quot;# Histological Staining Area Quantification\n\n## Overview\nThis workflow quantifies stained tissue areas in brightfield histological images \nusing colour deconvolution and automated thresholding. It is designed for \n3-channel stainings compatible with the H-E-DAB (HED) colour space, such as \nMasson&#39;s Trichrome (MT) and Immunohistochemistry (IHC).\n\n## What does this workflow do?\n1. **Stain intensity normalization** (CLAHE) equalizes pixel intensity across images to reduce staining variability before deconvolution.\n2. **Colour deconvolution** separates the normalized image into individual stain channels (HED).\n3. **Channel splitting and extraction** isolates the target stain channel (default: Channel 2).\n4. **Automated thresholding** (Li method) generates a binary mask of stained vs. unstained regions.\n5. **Feature extraction** quantifies staining area and intensity per sample.\n6. **Output collation** merges all per-sample results into a single tabular file.\n\n## Input data requirements\n- **Format:** TIFF\n- **Type:** Brightfield microscopy images\n- **Staining:** Compatible with HED colour deconvolution (e.g., Masson&#39;s Trichrome, IHC)\n- **Content:** Whole slide images or pre-cropped regions of interest (ROIs)\n- **Structure:** Dataset collection (list) — one image per sample\n\n&gt; ⚠️ Images must be pre-cropped to the region of interest before use.\n&gt; The workflow does not perform ROI selection.\n\n## Output\nA tabular file (TSV) containing one row per sample with the following columns:\n- `sample_id` — sample identifier\n- `label` — pixel label (1 = stained region)\n- `mean_intensity` — mean pixel intensity within the stained region\n- `area` — total number of stained pixels\n- `area_filled` — stained area with internal holes filled\n- `total_area` — total pixel count of the input image (width × height)\n- `percent_area` — staining area as percentage of total image area\n\n## Important notes\n- Verify that **Channel 2** corresponds to your stain of interest before running.\n  This can be checked by inspecting the deconvolved image output.\n- The thresholding method is **Li**. If results are suboptimal, adjust the offset \n  in the Threshold step.\n- The workflow processes images as a **collection**, enabling batch analysis \n  of multiple samples in a single run.\n\n## Compatible stainings\n| Staining | Target channel |\n|----------|---------------|\n| Masson&#39;s Trichrome (MT) | Channel 2 (Eosin/collagen) |\n| Immunohistochemistry (IHC) | Channel 2 (DAB) |\n\n## Citation\nIf you use this workflow, please cite it via its WorkflowHub DOI.&quot;],&quot;report&quot;:[0,{&quot;markdown&quot;:[0,&quot;# Histological Staining Area Quantification\n\n```galaxy\ninvocation_time()\n```\n\n---\n\n## Summary\n\nThis workflow quantifies stain area and intensity in brightfield microscopy histological images. Input images undergo colour deconvolution — an algorithm that mathematically separates overlapping stain signals into individual channels — to isolate the target stain from the haematoxylin counterstain. Automated thresholding then segments positively-stained pixels, and per-sample measurements are collated into a single tabular output.\n\nThe pre-set parameters use the H-E-DAB colour space, which is compatible with immunohistochemistry (IHC) with a DAB chromogen and Masson&#39;s Trichrome (MT). Other 3-channel staining protocols may also be supported by editing the colour deconvolution algorithm or thresholding type in the relevant workflow steps. The workflow expects RGB TIFF images — one region of interest (ROI) per collection element.\n\n```galaxy\nworkflow_image()\n```\n\n---\n\n## Run Configuration\n\nThe table below shows the parameters used in this workflow run. If any defaults were modified before running, please update this table accordingly before downloading the report.\n\n| Parameter | Default value |\n|-----------|--------------|\n| Colour deconvolution algorithm | H-E-DAB (HED) |\n| Target stain channel extracted | Channel 2 |\n| Thresholding method | Li (automated) |\n\n---\n\n## Input Images\n\nThe input to this workflow is a list collection of brightfield microscopy images. Each element should represent one region of interest from a tissue section. The images provided for this run are shown below.\n\n```galaxy\nvisualization(visualization_id=tiffviewer, input=\&quot;ROI image for staining analysis\&quot;)\n```\n\n---\n\n## Staining Mask\n\nIf the run completed successfully, each input image will have been converted into a binary mask via colour deconvolution and automated thresholding. In this mask, **white pixels** represent regions classified as positively stained and **black pixels** represent background. This mask is what the quantification measurements are derived from.\n\n&gt; ⚠️ **Quality check:** If the mask appears inverted (background is white, stained region is black) or nearly empty, verify that the correct stain channel was extracted. The default is Channel 2 — inspect the deconvolved intermediate image to confirm it corresponds to your stain of interest before proceeding to the results.\n\n```galaxy\nvisualization(visualization_id=tiffviewer, output=\&quot;Selected Stain Channel Thresholded\&quot;)\n```\n\n---\n\n## Results\n\nIf the workflow completed successfully, the table below shows per-sample staining measurements — one row per input image.\n\nFor quantitative comparisons between samples or groups, **`percent_area`** is typically the primary outcome of interest, as it normalises staining area to image size and is directly suitable for downstream statistical analysis. **`area`** and **`area_filled`** may be used for absolute comparisons when all images are of consistent dimensions — `area_filled` is particularly useful when the stained region contains internal holes (e.g. dense fibrosis in Masson&#39;s Trichrome). **`mean_intensity`** can serve as a secondary measure of staining density, but note that due to deconvolution inversion, **lower values indicate stronger staining** — interpret accordingly.\n\n| Column | Description |\n|--------|-------------|\n| `sample_id` | Identifier derived from the input image filename |\n| `label` | Region label assigned by the thresholding step |\n| `mean_intensity` | Average pixel intensity within the detected region (lower = stronger stain, due to deconvolution inversion) |\n| `area` | Pixel count of the positively stained region |\n| `area_filled` | Stained area with internal holes filled |\n| `total_area` | Total pixel count of the input image (width × height) |\n| `percent_area` | Staining area as a percentage of total image area (`area / total_area × 100`) |\n\n```galaxy\nhistory_dataset_as_table(output=\&quot;Tabular File: Staining Feature Results\&quot;, title=\&quot;Staining Feature Results\&quot;)\n```\n\n```galaxy\nhistory_dataset_link(output=\&quot;Tabular File: Staining Feature Results\&quot;, label=\&quot;Download results (TSV)\&quot;)\n```\n\n---\n\n## Reproducibility\n\n```galaxy\nhistory_link()\n```\n\n```galaxy\nworkflow_license()\n```\n\n---\n\n## Citation\n\nIf you use this workflow in your research, please cite it via its WorkflowHub entry:\n**Diana Chiang Jurado** — *Histological Staining Area Quantification*, WorkflowHub, https://workflowhub.eu/workflows/2179, CC-BY-4.0.&quot;]}],&quot;steps&quot;:[0,{&quot;0&quot;:[0,{&quot;annotation&quot;:[0,&quot;B _input&quot;:[0,{&quot;ROI image for staining analysis&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;todo_element_name&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]]]}]}],&quot;readme&quot;:[0,&quot;# Histological Staining Area Quantification\n\n## Overview\nThis workflow quantifies stained tissue areas in brightfield histological images \nusing colour deconvolution and automated thresholding. Input images are first \nnormalized with CLAHE (Contrast Limited Adaptive Histogram Equalization) to reduce \nstaining variability before deconvolution. It is designed for 3-channel stainings \ncompatible with the H-E-DAB (HED) colour space, such as Masson&#39;s Trichrome (MT) \nand Immunohistochemistry (IHC).\n\n## What does this workflow do?\n1. **Stain intensity normalization** (CLAHE) equalizes pixel intensity across images to reduce staining variability.\n2. **Colour deconvolution** separates the normalized image into individual stain channels (HED).\n3. **Channel splitting and extraction** isolates the target stain channel (default: Channel 2).\n4. **Automated thresholding** (Li method) generates a binary mask of stained vs. unstained regions.\n5. **Feature extraction** quantifies staining area and intensity per sample.\n6. **Output collation** merges all per-sample results into a single tabular file.\n\n## Inputs\n- **Format:** TIFF\n- **Type:** Brightfield microscopy images (whole slide or pre-cropped ROIs)\n- **Structure:** Dataset collection (list) — one image per sample\n\n## Outputs\nA tabular file (TSV) with one row per sample:\n- `sample_id` — sample identifier\n- `label` — pixel label (1 = stained region)\n- `mean_intensity` — mean pixel intensity within the stained region\n- `area` — total number of stained pixels\n- `area_filled` — stained area with internal holes filled\n- `total_area` — total pixel count of the input image (width × height)\n- `percent_area` — staining area as percentage of total image area\n\n## Compatible stainings\n\n| Staining | Target channel |\n|----------|----------------|\n| Masson&#39;s Trichrome (MT) | Channel 2 |\n| Immunohistochemistry (IHC) | Channel 2 (DAB) |\n\n## Notes\n- Images must be pre-cropped to the region of interest before use.\n- Verify that Channel 2 corresponds to your stain of interest before running.\n\n## Citation\nIf you use this workflow, please cite it via its WorkflowHub DOI.&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [0.1.2] - 2026-06-09\n\n### Added\n- Stain intensity normalization step using CLAHE (Contrast Limited Adaptive Histogram Equalization) before colour deconvolution, to reduce staining variability across images.\n\n### Changed\n- Add interactive workflow report with invocation summary, input image viewer, staining mask viewer, and results table.\n- Update `ip_imageinfo` to `8.0.0+galaxy0` (was `5.7.1+galaxy1`).\n- Update `ip_split_image` to `2.3.5+galaxy1` (was `2.3.5+galaxy0`).\n- Update `imagej2_analyze_particles_binary` to `20240614+galaxy1` (was `20240614+galaxy0`).\n- Update `collection_element_identifiers` to `0.0.3` (was `0.0.2`).\n\n## [0.1.1] - 2026-05-28\n\n### Fixed\n- Use bare ORCID identifier in `.dockstore.yml` so Dockstore accepts the author metadata.\n\n## [0.1] - 2026-05-18\n\n### Added\n- Initial release of the Histological Staining Area Quantification workflow.\n- Quantifies stained tissue area in brightfield IHC/MT images using colour deconvolution and automated thresholding.\n- Compatible with Masson&#39;s Trichrome (MT) and Immunohistochemistry (IHC) stainings (H-E-DAB colour space).\n- Test data available on Zenodo:\n  - CD11b IHC ROIs — infarct zone (4-oxo-RA treated): https://doi.org/10.5281/zenodo.20157596\n  - CD11b IHC ROIs — border zone (4-oxo-RA treated): https://doi.org/10.5281/zenodo.20158418\n  - CD11b IHC ROIs — border and infarct zone (Vehicle/DMSO): https://doi.org/10.5281/zenodo.20271100&quot;],&quot;diagrams&quot;:[0,&quot;# Workflow diagrams\n\n## Histological Staining Area Quantification\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ ROI image for staining analysis\&quot;]@{ shape: docs }\n1[\&quot;Sample ID\&quot;]@{ shape: process }\n2[\&quot;header for total area\&quot;]@{ shape: process }\n3[\&quot;Stain intensity normalization (CLAHE)\&quot;]@{ shape: process }\n0 --&gt; 3\n4[\&quot;Show image info\&quot;]@{ shape: process }\n0 --&gt; 4\n5[\&quot;Color Deconvolution\&quot;]@{ shape: process }\n3 --&gt; 5\n6[\&quot;Width Extraction\&quot;]@{ shape: process }\n4 --&gt; 6\n7[\&quot;Height Extraction\&quot;]@{ shape: process }\n4 --&gt; 7\n8[\&quot;Split Image Channels for Staining Detection\&quot;]@{ shape: process }\n5 --&gt; 8\n9[\&quot;Text transformation\&quot;]@{ shape: process }\n6 --&gt; 9\n10[\&quot;Text transformation\&quot;]@{ shape: process }\n7 --&gt; 10\n11[\&quot;Collection: Extract Stain Channel from Sub-Collections\&quot;]@{ shape: process }\n8 --&gt; 11\n12[\&quot;Paste\&quot;]@{ shape: process }\n9 --&gt; 12\n10 --&gt; 12\n13[\&quot;Threshold Stain Channel Collection\&quot;]@{ shape: process }\n11 --&gt; 13\n14[\&quot;Compute\&quot;]@{ shape: process }\n12 --&gt; 14\n15[\&quot;Generate ROIs of stained region\&quot;]@{ shape: process }\n13 --&gt; 15\n16[\&quot;Extract Image Features\&quot;]@{ shape: process }\n13 --&gt; 16\n11 --&gt; 16\n17[\&quot;Cut\&quot;]@{ shape: process }\n14 --&gt; 17\n18[\&quot;Prepare Header Source Dataset\&quot;]@{ shape: process }\n16 --&gt; 18\n19[\&quot;Extract\&quot;]@{ shape: process }\n16 --&gt; 19\n20[\&quot;Extract element identifiers\&quot;]@{ shape: process }\n16 --&gt; 20\n21[\&quot;Collapse Collection\&quot;]@{ shape: process }\n17 --&gt; 21\n22[\&quot;Header Extraction\&quot;]@{ shape: process }\n18 --&gt; 22\n23[\&quot;Collapse Collection into one file\&quot;]@{ shape: process }\n19 --&gt; 23\n24[\&quot;Concatenate datasets\&quot;]@{ shape: pr
