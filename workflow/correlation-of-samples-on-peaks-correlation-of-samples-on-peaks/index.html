3-9444-3944&quot;]}]]],&quot;definition&quot;:[0,{&quot;a_galaxy_workflow&quot;:[0,&quot;true&quot;],&quot;annotation&quot;:[0,&quot;This workflow computes read coverage of BAM/CRAM samples over a merged set of peak regions to generate a pairwise correlation plot, along with the corresponding raw read counts and coverage matrix.&quot;],&quot;comments&quot;:[1,[]],&quot;creator&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;https://orcid.org/0000-0002-1964-4960&quot;],&quot;name&quot;:[0,&quot;Lucille Delisle&quot;]}],[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;https://orcid.org/0000-0002-1228-0308&quot;],&quot;name&quot;:[0,&quot;Alexandre Mayran&quot;]}],[0,{&quot;class&quot;:[0,&quot;Person&quot;],&quot;identifier&quot;:[0,&quot;https://orcid.org/0009-0003-9444-3944&quot;],&quot;name&quot;:[0,&quot;Olusegun E. Adebayo&quot;]}]]],&quot;format-version&quot;:[0,&quot;0.1&quot;],&quot;license&quot;:[0,&quot;MIT&quot;],&quot;release&quot;:[0,&quot;0.1&quot;],&quot;name&quot;:[0,&quot;correlation of samples on peaks&quot;],&quot;readme&quot;:[0,&quot;# Correlation of samples on peaks\n\n## Input datasets\n\n- A collection (list) of peak files.\n- A collection (list) of BAM or CRAM files\n\n## Input values\n\n- Reference genome: this field will be adapted to the genomes for bedtools sort (dbkeys table)\n\n## Processing\n\n- The workflow will concatenate the list of peak files given as input\n- Sorts and merges the concatenated BED file by Chromosome using `bedtools sortBED` and `bedtools mergeBED`, respectively.\n- Computes the read coverages for each BAM/CRAM file on the sorted and merged list of genomic region present in the bed files using `multiBamSummary`.\n- Calculate and visualize pairwise correlation values between the read coverages using the tool `plotCorrelation`.\n- The workflow produces three outputs:\n  - a compressed numpy array containing the raw count of the read coverages (i.e., th  count of the read coverages (i.e., the output of `multiBamSummary`) in .npz format\n  - The same raw count of the read coverages (i.e., the output of `multiBamSummary`) in .tabular format\n  - a plot of pairwise correlation values between the read coverages (i.e., the output of `plotCorrelation`).\n\n ## Note \n A similar workflow `consensus-peaks` creates peaks from raw replicate BAMs via MACS2-based calling and reproducibility filtering while `correlation-of-samples-on-peaks` takes existing peaks together with BAM/CRAM files and tells you how correlated the samples&#39; signal is over those regions. In other words, this workflow serves as a downstream QC step of `consensus-peaks` rather than a peak-calling step itself. \n&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n   \n## [0.1] - 2026-07-06\n   \nFirst release.\n&quot;],&quot;diagrams&quot;:[0,&quot;# Workflow diagrams\n\n## correlation of samples on peaks\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ Collection of peak files\&quot;]@{ shape: docs }\n1[\&quot;ℹ️ Reference genome\&quot;]@{ shape: lean-l }\n2[\&quot;ℹ️ BAM or CRAM files\&quot;]@{ shape: docs }\n3[\&quot;Concatenate all files into one\&quot;]@{ shape: process }\n0 --&gt; 3\n4[\&quot;Sort bed files\&quot;]@{ shape: process }\n1 --&gt; 4\n3 --&gt; 4\n5[\&quot;Merge bed file\&quot;]@{ shape: process }\n4 --&gt; 5\n6[\&quot;multiBamSummary\&quot;]@{ shape: process }\n5 --&gt; 6\n2 --&gt; 6\n7[\&quot;Correlation plot\&quot;]@{ shape: process }\n6 --&gt; 7\n```\n&quot;],&quot;diagram_svg&quot;:[0,null],&quot;updated&quot;:[0,&quot;2026-07-06T00:00:00&quot;],&quot;trsID&quot;:[0,&quot;#workflow/github.com/iwc-workflows/correlation-of-samples-on-peaks/correlation-of-samples-on-peaks&quot;],&quot;iwcID&quot;:[0,&quot;correlation-of-samples-on-peaks-correlation-of-samples-on-peaks&quot;],&quot;repoPath&quot;:[0,&quot;./workflows/epigenetics/correlation-of-samples-on-peaks&quot;],&quot;dockstore_id&quot;:[0,37813],&quot;categories&quot;:[1,[]],&quot;collections
