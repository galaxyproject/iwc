:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;todo_element_name&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]]]}],&quot;GTDB-Tk Database&quot;:[0,&quot;todo_param_value&quot;],&quot;kMetaShot Database&quot;:[0,&quot;todo_param_value&quot;]}],&quot;readme&quot;:[0,&quot;# MAGs Taxonomy Annotation\n\nThis workflow generates taxonomic annotations for MAGs using GTDB-Tk and kMetaShot. With the integration of additional tools, MAGs also receive corresponding taxonomic classifications from NCBI.\n\n## Workflow logic\nThe workflow first runs GTDB-Tk and kMetaShot (optional) to generate a summary file. From this file, it extracts the GTDB lineage for each MAG and reformats it so that the GTDB–NCBI mapping tool can translate GTDB names into their corresponding NCBI names. These NCBI names are then passed to another tool, which resolves them into the corresponding NCBI taxIDs.\n\nIn parallel, an additional text-processing step extracts the taxonomic rank from the GTDB-Tk annotation. Finally, all collected information is merged into a single file with the following five columns:\n\n- BinID\n- GTDB name\n- Taxonomic rank\n- NCBI name\n- NCBI taxID\n\n## Input\nThis workflow takes a dataset collection (a Galaxy collection of type list) containing MAGs produced by binners (e.g. MetaBAT2, dRep) in FASTA format.\n\n## Output\nThis workflow produces the following main outputs: \n\n- GTDB-Tk summary file(s)\n- kMetaSHot summary file (optional)\n- GTDB–NCBI mapping file(s)\n- NCBI name-to-taxID mapping file(s)\n- A complete merged table containing all mappings\n- MultiQC HTML report with GTDB-Tk and the full mapping table as input as well as kMetaShot if run&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [0.3] - 2026-07-03\n\n### Fixed\n- Corrected the column order and names in the final text formatting step.\n- Corrected the MultiQC section name for the second input.\n\n## [0.2] - 2026-03-22\n\n- Add kMetaShot classifier as optional tool to run\n\n## [0.1] - 2026-02-13\n\n- First release\n&quot;],&quot;diagrams&quot;:[0,&quot;# Workflow diagrams\n\n## MAGs taxonomy annotation\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ Sequence collection\&quot;]@{ shape: docs }\n1[\&quot;ℹ️ GTDB-Tk Database\&quot;]@{ shape: lean-l }\n2[\&quot;ℹ️ MAGs taxonomic classification with kMetaShot (optional)\&quot;]@{ shape: lean-l }\n3[\&quot;ℹ️ kMetaShot Database\&quot;]@{ shape: lean-l }\n4[\&quot;ℹ️ ass2ref for kMS\&quot;]@{ shape: lean-l }\n5[\&quot;GTDB-Tk Classify genomes\&quot;]@{ shape: process }\n1 --&gt; 5\n0 --&gt; 5\n6[\&quot;kMetaShot taxonomic classification of MAGs\&quot;]@{ shape: process }\n4 --&gt; 6\n0 --&gt; 6\n3 --&gt; 6\n2 --&gt; 6\n7[\&quot;Concatenate multiple datasets or collections\&quot;]@{ shape: process }\n5 --&gt; 7\n8[\&quot;Pick parameter value\&quot;]@{ shape: process }\n6 --&gt; 8\n9[\&quot;Pick parameter value\&quot;]@{ shape: process }\n6 --&gt; 9\n10[\&quot;Cut\&quot;]@{ shape: process }\n7 --&gt; 10\n11[\&quot;Collapse Collection\&quot;]@{ shape: process }\n7 --&gt; 11\n12[\&quot;Convert\&quot;]@{ shape: process }\n8 --&gt; 12\n13[\&quot;Convert\&quot;]@{ shape: process }\n9 --&gt; 13\n14[\&quot;Text reformatting\&quot;]@{ shape: process }\n10 --&gt; 14\n15[\&quot;Text reformatting\&quot;]@{ shape: process }\n11 --&gt; 15\n16[\&quot;Replace Text\&quot;]@{ shape: process }\n14 --&gt; 16\n17[\&quot;Replace Text\&quot;]@{ shape: process }\n15 --&gt; 17\n18[\&quot;Remove beginning\&quot;]@{ shape: process }\n16 --&gt; 18\n19[\&quot;Text reformatting\&quot;]@{ shape: process }\n16 --&gt; 19\n20[\&quot;NCBI-GTDB map\&quot;]@{ shape: process }\n18 --&gt; 20\n21[\&quot;Cut\&quot;]@{ shape: process }\n20 --&gt; 21\n22[\&quot;Replace Text\&quot;]@{ shape: process }\n21 --&gt; 22\n23[\&quot;Name2taxid\&quot;]@{ shape: process }\n22 --&gt; 23\n24[\&quot;Text reformatting\&quot;]@{ shape: process }\n23 --&gt; 24\n25[\&quot;Paste\&quot;]@{ shape:
