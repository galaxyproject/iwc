s the GTDB lineage for each MAG and reformats it so that the GTDB–NCBI mapping tool can translate GTDB names into their corresponding NCBI names. These NCBI names are then passed to another tool, which resolves them into the corresponding NCBI taxIDs.\n\nIn parallel, an additional text-processing step extracts the taxonomic rank from the GTDB-Tk annotation. Finally, all collected information is merged into a single file with the following five columns:\n\n- BinID\n- GTDB name\n- Taxonomic rank\n- NCBI name\n- NCBI taxID\n\n## Input\nThis workflow takes a dataset collection (a Galaxy collection of type list) containing MAGs produced by binners (e.g. MetaBAT2, dRep) in FASTA format.\n\n## Output\nThis workflow produces the following main outputs:\n\n- GTDB-Tk summary file(s)\n- GTDB–NCBI mapping file(s)\n- NCBI name-to-taxID mapping file(s)\n- A complete merged table containing all mappings\n- MultiQC HTML report with GTDB-Tk and the full mapping table as input&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [0.1] - 2026-02-13\n\n- First release\n&quot;],&quot;diagrams&quot;:[0,&quot;# Workflow diagrams\n\n## MAGs taxonomy annotation\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ Sequence collection\&quot;]@{ shape: docs }\n1[\&quot;ℹ️ GTDB-tk Database\&quot;]@{ shape: lean-l }\n2[\&quot;GTDB-Tk Classify genomes\&quot;]@{ shape: process }\n1 --&gt; 2\n0 --&gt; 2\n3[\&quot;Concatenate multiple datasets or collections\&quot;]@{ shape: process }\n2 --&gt; 3\n4[\&quot;Cut\&quot;]@{ shape: process }\n3 --&gt; 4\n5[\&quot;Collapse Collection\&quot;]@{ shape: process }\n3 --&gt; 5\n6[\&quot;Text reformatting\&quot;]@{ shape: process }\n4 --&gt; 6\n7[\&quot;Text reformatting\&quot;]@{ shape: process }\n5 --&gt; 7\n8[\&quot;Replace Text\&quot;]@{ shape: process }\n6 --&gt; 8\n9[\&quot;Replace Text\&quot;]@{ shape: process }\n7 --&gt; 9\n10[\&quot;Remove beginning\&quot;]@{ shape: process }\n8 --&gt; 10\n11[\&quot;Text reformatting\&quot;]@{ shape: process }\n8 --&gt; 11\n12[\&quot;NCBI-GTDB map\&quot;]@{ shape: process }\n10 --&gt; 12\n13[\&quot;Cut\&quot;]@{ shape: process }\n12 --&gt; 13\n14[\&quot;Replace Text\&quot;]@{ shape: process }\n13 --&gt; 14\n15[\&quot;Name2taxid\&quot;]@{ shape: process }\n14 --&gt; 15\n16[\&quot;Text reformatting\&quot;]@{ shape: process }\n15 --&gt; 16\n17[\&quot;Paste\&quot;]@{ shape: process }\n12 --&gt; 17\n16 --&gt; 17\n18[\&quot;Replace Text\&quot;]@{ shape: process }\n17 --&gt; 18\n19[\&quot;Join\&quot;]@{ shape: process }\n9 --&gt; 19\n18 --&gt; 19\n20[\&quot;Cut\&quot;]@{ shape: process }\n19 --&gt; 20\n21[\&quot;Join\&quot;]@{ shape: process }\n11 --&gt; 21\n20 --&gt; 21\n22[\&quot;Text reformatting\&quot;]@{ shape: process }\n21 --&gt; 22\n23[\&quot;MultiQC\&quot;]@{ shape: process }\n2 --&gt; 23\n22 --&gt; 23\n```\n&quot;],&quot;diagram_svg&quot;:[0,null],&quot;updated&quot;:[0,&quot;2026-02-13T00:00:00&quot;],&quot;trsID&quot;:[0,&quot;#workflow/github.com/iwc-workflows/mags-taxonomy-annotation/main&quot;],&quot;iwcID&quot;:[0,&quot;mags-taxonomy-annotation-main&quot;],&quot;repoPath&quot;:[0,&quot;./workflows/microbiome/mags-taxonomy-annotation&quot;],&quot;dockstore_id&quot;:[0,35592],&quot;categories&quot;:[1,[]],&quot;collections&quot;:[1,[]],&quot;doi&quot;:[0,&quot;10.5281/zenodo.18853307&quot;],&quot;tests&quot;:[1,[[0,{&quot;doc&quot;:[0,&quot;Test for MAGs-taxonomy-annotation.ga&quot;],&quot;job&quot;:[0,{&quot;Sequence collection&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;50contig_reads_binette_bin1.fasta&quot;],&quot;location&quot;:[0,&quot;https://zenodo.org/records/18635101/files/50contig_reads_binette_bin1.fasta&quot;],&quot;filetype&quot;:[0,&quot;fasta&quot;]}],[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;50contig_reads_binette_bin2.fasta&quot;],&quot;location&quot;:[0,&quot;https://zenodo.org
