:[0,&quot;af414d2d-00e9-4f0e-a89e-aacde04cb1e7&quot;]}]]]}]}],&quot;tags&quot;:[1,[]],&quot;uuid&quot;:[0,&quot;e1e6ce2d-d7c5-45a6-93eb-d730768f7c06&quot;],&quot;version&quot;:[0,1]}],&quot;workflow_job_input&quot;:[0,{&quot;Run eggNOG + completeness calculation&quot;:[0,&quot;todo_param_value&quot;],&quot;eggNOG mode select&quot;:[0,&quot;todo_param_value&quot;],&quot;Sequence collection&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;todo_element_name&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]]]}],&quot;Run InterProScan&quot;:[0,&quot;todo_param_value&quot;]}],&quot;readme&quot;:[0,&quot;# Functional annotation of protein or DNA sequences Workflow\n\nThis workflow utilizes eggNOG mapper and InterProScan for the functional annotation of protein or DNA sequences.\nIt can be used on proteins or DNA from any organism.\n\nEggNOG Mapper compares each protein sequence (or translated DNA sequence when nucleotide input is provided) of the annotation to a huge set of ortholog groups from the eggNOG database. In this database, each ortholog group is associated with functional annotations like Gene Ontology (GO) terms or KEGG pathways. When the protein sequence of a new gene is found to be very similar to one of these ortholog groups, the corresponding functional annotation is transferred to this new gene.\n\nInterProScan is a tool that analyses each protein sequence (or translated DNA sequence when nucleotide input is provided) from our annotation to determine if it contains one or several of the signatures from InterPro. When a protein contains a known signature, the corresponding functional annotation will be assigned to it by InterProScan.\n\n## Input dataset\nThis workflow requires a galaxy collection of type list with at least one file in fasta format.\n\n## Outputs for eggNOG Mapper\nThe output of this tool is a tabular file, where each line represents a gene from our annotation, with the functional annotation that was found by EggNOG-mapper. It includes a predicted protein name, GO terms, EC numbers, KEGG identifiers, etc.\n\n## Outputs for Interproscan\nThe output of this tool is both a tabular file and an XML file. Both contain the same information, but the tabular one is more readable for a Human: each line represents a gene from our annotation, with the different domains and motifs that were found by InterProScan.\n\nEach line corresponds to a motif found in one of the annotated proteins. The most interesting columns are:\n\n- Column 1: the protein identifier\n- Column 5: the identifier of the signature that was found in the protein sequence\n- Column 4: the database where this signature comes from (InterProScan regroups several motif databases)\n- Column 6: the human-readable description of the motif\n- Columns 7 and 8: the position where the motif was found\n- Column 9: a score for the match (if available)\n- Columns 12 and 13: identifier of the signature integrated in InterPro (if available). Have a look at an example webpage for IPR036859 on InterPro.\n- The following columns contain various identifiers that were assigned to the protein based on the match with the signature (Gene ontology term, Reactome, …)\n\n## Output for KEGG Pathways completeness\nThis tool calculates the completeness of metabolic pathways based on KEGG Orthologs (KOs) obtained from eggNOG annotations. In addition to estimating pathway completeness, the tool assigns each contig to the corresponding pathway and reports the pathway name and class. It also lists the KOs detected on the contig as well as the KOs that are missing for the pathway, enabling users to assess how close the pathway is to being complete.&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [0.3] - 2026-03-27\n\n- Set a parameter from Add toolshed.g2.bx.psu.edu/repos/iuc/kegg_pathways_completeness/kegg_pathways_completeness/1.3.0+galaxy0 to true to have a second and more detailed per contig output\n\n## [0.2] - 2026-02-07\n\n- Change the input to a collection such that multiple sequences can be run in parallel\n- Add a subworkflow that allows to run eggNOG with different types of sequences (protein, CDS, genome and metagenome).\n- Add the option that eggNOG and/or InterProScan can be skipped\n- Add the option to swap the input type for InterProScan\n- Add toolshed.g2.bx.psu.edu/repos/iuc/kegg_pathways_completeness/kegg_pathways_completeness/1.3.0+galaxy0 to calculate the pathway completeness with KOs coming from eggNOG\n- Change name of the workflow since now it is not specific for proteins anymore\n\n## [0.1] - 2024-12-04\n\nInitial version of the Functional annotation of protein sequence Workflow.\n&quot;],&quot;diagrams&quot;:[0,&quot;# Workflow diagrams\n\n## Functional annotation of sequences\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ Run eggNOG + completeness calculation\&quot;]@{ shape: lean-l }\n1[\&quot;ℹ️ eggNOG mode select\&quot;]@{ shape: lean-l }\n2[\&quot;ℹ️ Sequence collection\&quot;]@{ shape: docs }\n3[\&quot;ℹ️ Run InterProScan\&quot;]@{ shape: lean-l }\n4[\&quot;ℹ️ InterProScan mode select\&quot;]@{ shape: lean-l }\n5[\&quot;🛠️ Functional annotation of protein sequences subworkflow\&quot;]@{ shape: subprocess }\n1 --&gt; 5\n2 --&gt; 5\n0 --&gt; 5\n6[\&quot;Extract element identifiers\&quot;]@{ shape: process }\n2 --&gt; 6\n7[\&quot;Map parameter value\&quot;]@{ shape: process }\n4 --&gt; 7\n8[\&quot;Pick parameter value\&quot;]@{ shape: process }\n5 --&gt; 8\n9[\&quot;InterProScan\&quot;]@{ shape: process }\n2 --&gt; 9\n7 --&gt; 9\n3 --&gt; 9\n10[\&quot;Cut\&quot;]@{ shape: process }\n8 --&gt; 10\n11[\&quot;Filter Tabular\&quot;]@{ shape: process }\n10 --&gt; 11\n12[\&quot;Text reformatting\&quot;]@{ shape: process }\n11 --&gt; 12\n13[\&quot;Collapse Collection\&quot;]@{ shape: process }\n12 --&gt; 13\n14[\&quot;Paste\&quot;]@{ shape: process }\n6 --&gt; 14\n13 --&gt; 14\n15[\&quot;Calculate KEGG Pathways completeness\&quot;]@{ shape: process }\n14 --&gt; 15\n0 --&gt; 15\n```\n\n## Functional annotation of protein sequences subworkflow\n\n```mermaid\ngraph LR\n0[\&quot;ℹ️ Selected sequence type\&quot;]@{ shape: lean-l }\n1[\&quot;ℹ️ Sequence collection\&quot;]@{ shape: docs }\n2[\&quot;Map parameter value\&quot;]@{ shape: process }\n0 --&gt; 2\n3[\&quot;Map parameter value\&quot;]@{ shape: process }\n0 --&gt; 3\n4[\&quot;Map parameter value\&quot;]@{ shape: process }\n0 --&gt; 4\n5[\&quot;Map parameter value\&quot;]@{ shape: process }\n0 --&gt; 5\n6[\&quot;eggNOG Mapper (proteins)\&quot;]@{ shape: process }\n1 --&gt; 6\n2 --&gt; 6\n7[\&quot;eggNOG Mapper (CDS)\&quot;]@{ shape: process }\n1 --&gt; 7\n3 --&gt; 7\n8[\&quot;eggNOG Mapper (genome) \&quot;]@{ shape: process }\n1 --&gt; 8\n4 --&gt; 8\n9[\&quot;eggNOG Mapper (metagenome)\&quot;]@{ shape: process }\n1 --&gt; 9\n5 --&gt; 9\n10[\&quot;Pick parameter value\&quot;]@{ shape: process }\n6 --&gt; 10\n7 --&gt; 10\n8 --&gt; 10\n9 --&gt; 10\n11[\&quot;Pick parameter value\&quot;]@{ shape: process }\n6 --&gt; 11\n7 --&gt; 11\n8 --&gt; 11\n9 --&gt; 11\n```\n&quot;],&quot;diagram_svg&quot;:[0,null],&quot;updated&quot;:[0,&quot;2026-03-27T00:00:00&quot;],&quot;trsID&quot;:[0,&quot;#workflow/github.com/iwc-workflows/functional-annotation-of-sequences/main&quot;],&quot;iwcID&quot;:[0,&quot;functional-annotation-of-sequences-main&quot;],&quot;repoPath&quot;:[0,&quot;./workflows/genome_annotation/functional-annotation/functional-annotation-of-sequences&quot;],&quot;dockstore_id&quot;:[0,36105],&quot;categories&quot;:[1,[]],&quot;collections&quot;:[1,[]],&quot;doi&quot;:[0,&quot;10.5281/zenodo.19187248&quot;],&quot;tests&quot;:[1,[[0,{&quot;doc&quot;:[0,&quot;Test outline for Functional_annotation_of_sequences.ga for protein&quot;],&quot;job&quot;:[0,{&quot;Sequence collection&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list
