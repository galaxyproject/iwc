y : \n- VGP1: Kmer profiling \n- VGP4: Genome assembly with HiC phasing\n- VGP6: Purge duplicated haplotigs\n- VGP8: Scaffolding with HiC\n\n## Inputs\n\n1. Species Name [text] Name of the species being assembled.\n2. Assembly Name [text] Name of the assembly.\n3. Genome assembly [gfa]\n4. Haplotype being scaffolded (Will be added to scaffold names: e.g. `&gt;scaffold_01_H1`)\n5. HiC reads paired collection [fastq]\n6. Trim Hi-C data? If `yes`, trim five bases at the beginning of each read. Use with Arima Hi-C data if the Hi-C map looks \&quot;noisy\&quot; and the reads haven&#39;t been trimmed before.\n7. Minimum Mapping Quality [int] (Default:20). Minimum mapping quality for Hi-C alignments. Set to 0 if you want no filtering.\n8. Database for Compleasm lineage (recommended: latest)\n9. Compleasm lineage (recommended for VGP data: vertebrata)\n10. Restriction enzyme sequence (recommended for VGP data: Arima Hi-C 2.0)\n11. Estimated genome size [txt] (Output from the contigging workflows 3,4, or 5). A simple text file containing the estimated genome size as an integer. E.g. `2288021`\n\n\n### Outputs\n\n1. Scaffolds in [fasta] and [gfa] format with the haplotype in the scaffold names.\n2. If you selected `yes` for Hi-C trimming, the trimmed collections of Hi-C reads.\n3. QC: Assembly statistics.\n4. QC: Hi-C duplications statistics on contigs and scaffolds.\n5. QC: Pairtools MultiQC stats on contigs and scaffolds.\n6. QC: Nx plot.\n7. QC: Size plot.\n8. QC: Compleasm summary and full table.\n9. QC: Pretext Maps before and after scaffolding.\n10. QC: Statistics on Hi-C alignements before and after scaffolding&quot;],&quot;report&quot;:[0,{&quot;markdown&quot;:[0,&quot;# Scaffolding Report\n\n```galaxy\nhistory_dataset_peek(output=\&quot;Assembly Info\&quot;)\n```\n\n## Hi-C Statistics\n\nRaw Coverage\n\n\n```galaxy\nhistory_dataset_peek(output=\&quot;Raw Hi-C coverage\&quot;)\n```\n\n\n### Deduplication\n\n\n```galaxy\nhistory_dataset_as_table(output=\&quot;Hi-C duplication stats on contigs: Raw\&quot;)\n```\n\n\r\n```galaxy\nhistory_dataset_as_table(output=\&quot;Hi-C duplication stats on contigs\&quot;)\n```\r\n\n\n\n\n\n#### Summary of duplications on scaffolds\n\n\n\n```galaxy\nhistory_dataset_as_table(output=\&quot;Hi-C duplication stats on scaffolds: Raw\&quot;)\n```\n\n\n#### Pair types Plots\n\nPairs by alignment status\nNumber of pairs classified according to their alignment status, including uniquely mapped (UU), unmapped (NN), duplicated (DD), and others.\n\n```galaxy\nhistory_dataset_as_image(output=\&quot;Pair Types Plots\&quot;)\n```\n\n\n#### Pairs by distance and orientation\n\n```galaxy\nhistory_dataset_as_image(output=\&quot;Broom Plots\&quot;)\n```\n\n\n#### Cis Pairs plots\n\n\n```galaxy\nhistory_dataset_as_image(output=\&quot;Pair by orientation pct plots\&quot;)\n```\n\n\n### Alignment stats\n\n```galaxy\nhistory_dataset_as_table(output=\&quot;Hi-C alignments on Scaffolds stats multiqc\&quot;)\n```\n\n#### Percent mapped\n\nAlignment metrics from samtools stats; mapped vs. unmapped reads vs. reads mapped with MQ0.\n\n\n```galaxy\nhistory_dataset_as_image(output=\&quot;samtools_alignment_plot-pct\&quot;)\n```\n\n\n#### Alignment stats\nThis module parses the output from samtools stats. All numbers in millions.\n\n\n```galaxy\nhistory_dataset_as_image(output=\&quot;samtools-stats-dp\&quot;)\n```\n\n\n## Compleasm results \n\nDatabase:\n```galaxy\nhistory_dataset_peek(output=\&quot;Lineage for report\&quot;)\n```\n\n```galaxy\nhistory_dataset_embedded(output=\&quot;Scaffolds Compleasm Summary\&quot;)\n```\n\n\n## Assembly statistics\n\n```galaxy\nhistory_dataset_as_table(output=\&quot;Assembly Statistics for s2\&quot;)\n```\n\n\n## Nx and Size plots\n\n\n```galaxy\nhistory_dataset_as_image(output=\&quot;Scaffolding Plots\&quot;)\n```\n\n\n## PretextMap\n\n```galaxy\nhistory_dataset_as_image(output=\&quot;Hi-C maps\&quot;)\n```\n\n&quot;]}],&quot;steps&quot;:[0,{&quot;0&quot;:[0,{&quot;annotation&quot;:[0,&quo ot;:[0,{&quot;Merqury plot collection&quot;:[0,{&quot;id&quot;:[0,67],&quot;input_subworkflow_step_id&quot;:[0,0],&quot;output_name&quot;:[0,&quot;png_plot&quot;]}]}],&quot;inputs&quot;:[1,[]],&quot;label&quot;:[0,null],&quot;name&quot;:[0,&quot;Parse pairtools merqury output&quot;],&quot;outputs&quot;:[1,[]],&quot;position&quot;:[0,{&quot;left&quot;:[0,7575.455237424674],&quot;top&quot;:[0,1722.820050826348]}],&quot;subworkflow&quot;:[0,{&quot;a_galaxy_workflow&quot;:[0,&quot;true&quot;],&quot;annotation&quot;:[0,&quot;&quot;],&quot;comments&quot;:[1,[]],&quot;creator&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;Organization&quot;],&quot;name&quot;:[0,&quot;VGP&quot;],&quot;url&quot;:[0,&quot;https://vertebrategenomeproject.org&quot;]}],[0,{&quot;class&quot;:[0,&quot;Organization&quot;],&quot;name&quot;:[0,&quot;Galaxy&quot;]}]]],&quot;format-version&quot;:[0,&quot;0.1&quot;],&quot;license&quot;:[0,&quot;CC-BY-4.0&quot;],&quot;name&quot;:[0,&quot;Parse pairtools merqury output&quot;],&quot;readme&quot;:[0,&quot;# Scaffolding with HiC data\n\nThis workflow performs genome assembly scaffolding using HiC data with YAHS. It is designed to be run as part of the VGP analysis trajectories, but can be used on any assembly in GFA format with Hi-C data. To generate a GFA from a fasta assembly, you can use the gfastats tool in Galaxy.  \n\nExample of VGP trajectory : \n- VGP1: Kmer profiling \n- VGP4: Genome assembly with HiC phasing\n- VGP6: Purge duplicated haplotigs\n- VGP8: Scaffolding with HiC\n\n## Inputs\n\n1. Genome assembly [gfa]\n2. Haplotype being scaffolded (Will be added to scaffold names: e.g. `&gt;scaffold_01_H1`)\n3. HiC reads paired collection [fastq]\n5. Trim Hi-C data? If `yes`, trim five bases at the beginning of each read. Use with Arima Hi-C data if the Hi-C map looks \&quot;noisy\&quot; and the reads haven&#39;t been trimmed before. \n6. Minimum Mapping Quality [int] (Default:20). Minimum mapping quality for Hi-C alignments. Set to 0 if you want no filtering.  \n6. Database for busco lineage (recommended: latest)\n7. Busco lineage (recommended for VGP data: vertebrata)\n8. Restriction enzyme sequence (recommended for VGP data: Arima Hi-C 2.0)\n9. Estimated genome size [txt] (Output from the contigging workflows 3,4, or 5). A simple text file containing the estimated genome size as an integer. E.g. `2288021`\n\n\n### Outputs\n\n1. Scaffolds in [fasta] and [gfa] format with the haplotype in the scaffold names.\n2. If you selected `yes` for Hi-C trimming, the trimmed collections of Hi-C reads.\n3. QC: Assembly statistics.\n4. QC: Nx plot.\n5. QC: Size plot.\n6. QC: BUSCO report.\n7. QC: Compleasm report.\n8. QC: Pretext Maps before and after scaffolding.\n9. QC: Statistics on Hi-C alignements before and after scaffolding\n&quot;],&quot;report&quot;:[0,{&quot;markdown&quot;:[0,&quot;# Scaffolding Report\n\n```galaxy\nhistory_dataset_peek(output=\&quot;Assembly Info\&quot;)\n```\n\n## Hi-C Statistics\n\nRaw Coverage\n\n```galaxy\nhistory_dataset_peek(output=\&quot;Raw Hi-C coverage\&quot;)\n```\n\n### Deduplication\n\n```galaxy\nhistory_dataset_as_table(output=\&quot;Markduplicates Summary\&quot;, show_column_headers=false, footer=&#39;Summary of deduplication before YAHS&#39;)\n```\n\n#### Summary of duplications on scaffolds\n\n\n```galaxy\nhistory_dataset_embedded(output=\&quot;Hi-C duplication stats on scaffolds: MultiQc\&quot;)\n```\n\n\n### Alignment stats\n\n\n```galaxy\nhistory_dataset_as_table(output=\&quot;Merged Alignment stats\&quot;, show_column_headers=False, footer=&#39;Summary of Hi-C alignment statistics&#39;)\n```\n\n#### MultiQC report on Hi-C alignments on Scaffolds\n\nPairs by alignment status\nNumber of pairs classified according to their alignment status, including uniquely mapped (UU), unmapped (NN), duplicated (DD), and others.\n\n\r\n```galaxy\nhistory_dataset_as_image(output=broom_plot_P_s_)\n```\r\n\n\n\n## Compleasm results \n\nDatabase:\n```galaxy\nhistory_dataset_peek(output=\&quot;Lineage for report\&quot;)\n```\n\n\n```galaxy\nhistory_dataset_embedded(output=\&quot;Scaffolds Compleasm Summary\&quot;)\n```\n\n\n## Assembly statistics\n\n\n```galaxy\nhistory_dataset_as_table(output=\&quot;Assembly Statistics for s2\&quot;)\n```\n\n\n## Nx and Size plots\n\n\n```galaxy\nhistory_dataset_as_image(output=\&quot;Scaffolding Plots\&quot;)\n```\n\n\n## PretextMap\n\n```galaxy\nhistory_dataset_as_image(output=\&quot;Hi-C maps\&quot;)\n```\n\n&quot;]}],&quot;steps&quot;:[0,{&quot;0&quot;:[0,{&quot;annotation&quot;:[0,&quot;&quot;],&quot;content_id&quot;:[0,null],&quot;errors&quot;:[0,null],&quot;id&quot;:[0,0],&quot;input_connections&quot;:[0,{}],&quot;inputs&quot;:[1,[[0,{&quot;description&quot;:[0,&quot;&quot;],&quot;name&quot;:[0,&quot;Merqury plot collection&quot;]}]]],&quot;label&quot;:[0,&quot;Merqury plot collection&quot;],&quot;name&quot;:[0,&quot;Input dataset collection&quot;],&quot;outputs&quot;:[1,[]],&quot;position&quot;:[0,{&quot;left&quot;:[0,0],&quot;top&quot;:[0,295.4371195949325]}],&quot;tool_id&quot;:[0,null],&quot;tool_state&quot;:[0,&quot;{\&quot;optional\&quot;: false, \&quot;format\&quot;: [\&quot;png\&quot;], \&quot;tag\&quot;: null, \&quot;collection_type\&quot;: \&quot;list\&quot;, \&quot;fields\&quot;: null, \&quot;column_definitions\&quot;: null}&quot;],&quot;tool_version&quot;:[0,null],&quot;type&quot;:[0,&quot;data_collection_input&quot;],&quot;uuid&quot;:[0,&quot;7a4c184f-ebe6-4a6d-bccb-c91f6a63aa3f&quot;],&quot;when&quot;:[0,null],&quot;workflow_outputs&quot;:[1,[]]}],&quot;1&quot;:[0,{&quot;annotation&quot;:[0,&quot;&quot;],&quot;content_id&quot;:[0,&quot;toolshed.g2.bx.psu.edu/repos/iuc/collection_element_identifiers/collection_element_identifiers/0.0.2&quot;],&quot;errors&quot;:[0,null],&quot;id&quot;:[0,1],&quot;input_connections&quot;:[0,{&quot;input_collection&quot;:[0,{&quot;id&quot;:[0,0],&quot;output_name&quot;:[0,&quot;output&quot;]}]}],&quot;inputs&quot;:[1,[]],&quot;label&quot;:[0,null],&quot;name&quot;:[0,&quot;Extrac ot;:[0,&quot;todo_param_value&quot;],&quot;Assembly GFA&quot;:[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}],&quot;Haplotype&quot;:[0,&quot;todo_param_value&quot;],&quot;Hi-C reads&quot;:[0,{&quot;class&quot;:[0,&quot;Collection&quot;],&quot;collection_type&quot;:[0,&quot;list&quot;],&quot;elements&quot;:[1,[[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;identifier&quot;:[0,&quot;todo_element_name&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]]]}],&quot;Trim Hi-C Data?&quot;:[0,&quot;todo_param_value&quot;],&quot;Database for Busco Lineage&quot;:[0,&quot;todo_param_value&quot;],&quot;Lineage&quot;:[0,&quot;todo_param_value&quot;],&quot;Restriction enzymes&quot;:[0,&quot;todo_param_value&quot;],&quot;Estimated genome size - Parameter File&quot;:[0,{&quot;class&quot;:[0,&quot;File&quot;],&quot;path&quot;:[0,&quot;todo_test_data_path.ext&quot;]}]}],&quot;readme&quot;:[0,&quot;# Scaffolding with HiC data\n\nThis workflow performs genome assembly scaffolding using HiC data with YAHS. It is designed to be run as part of the VGP analysis trajectories, but can be used on any assembly in GFA format with Hi-C data. To generate a GFA from a fasta assembly, you can use the gfastats tool in Galaxy.  \n\nExample of VGP trajectory : \n- VGP1: Kmer profiling \n- VGP4: Genome assembly with HiC phasing\n- VGP6: Purge duplicated haplotigs\n- VGP8: Scaffolding with HiC\n\n## Inputs\n\n1. Species Name [text] Name of the species being assembled.\n2. Assembly Name [text] Name of the assembly.\n3. Genome assembly [gfa]\n4. Haplotype being scaffolded (Will be added to scaffold names: e.g. `&gt;scaffold_01_H1`)\n5. HiC reads paired collection [fastq]\n6. Trim Hi-C data? If `yes`, trim five bases at the beginning of each read. Use with Arima Hi-C data if the Hi-C map looks \&quot;noisy\&quot; and the reads haven&#39;t been trimmed before.\n7. Minimum Mapping Quality [int] (Default:20). Minimum mapping quality for Hi-C alignments. Set to 0 if you want no filtering.\n8. Database for Compleasm lineage (recommended: latest)\n9. Compleasm lineage (recommended for VGP data: vertebrata)\n10. Restriction enzyme sequence (recommended for VGP data: Arima Hi-C 2.0)\n11. Estimated genome size [txt] (Output from the contigging workflows 3,4, or 5). A simple text file containing the estimated genome size as an integer. E.g. `2288021`\n\n\n### Outputs\n\n1. Scaffolds in [fasta] and [gfa] format with the haplotype in the scaffold names.\n2. If you selected `yes` for Hi-C trimming, the trimmed collections of Hi-C reads.\n3. QC: Assembly statistics.\n4. QC: Hi-C duplications statistics on contigs and scaffolds.\n5. QC: Pairtools MultiQC stats on contigs and scaffolds.\n6. QC: Nx plot.\n7. QC: Size plot.\n8. QC: Compleasm summary and full table.\n9. QC: Pretext Maps before and after scaffolding.\n10. QC: Statistics on Hi-C alignements before and after scaffolding\n&quot;],&quot;changelog&quot;:[0,&quot;# Changelog\n\n## [3.5] - 2026-03-30\n\n### Changes\n- Samtools markdup now removes duplicates instead of only marking them\n- Fix MultiQC input connections for Pairtools and Hi-C alignment stats\n\n## [3.4] - 2026-03-09\n\n### Changes\n- Remove \&quot;Alignment General Stats 2\&quot; output that was incompatible with MultiQC v1.33 (element `general_stats_table` no longer exists in the `png_plot` output collection)\n- Set new PretextMap `high_res` parameter to `false`\n- Replace Picards MarkDuplicates tool by Samtools markdup\n\n### Automatic update\n- `toolshed.g2.bx.psu.edu/repos/lparsons/cutadapt/cutadapt/5.2+galaxy0` was updated to `toolshed.g2.bx.psu.edu/repos/lparsons/cutadapt/cutadapt/5.2+galaxy2`\n- `toolshed.g2.bx.psu.edu/repos/iuc/pretext_map/pretext_map/0.1.9+galaxy1` was updated to `toolshed.g2.bx.psu.edu/repos/iuc/pretext_map/pretext_map/0.2.3+galaxy0`\n- `toolshed.g2.bx.psu.edu/repos/devteam/samtools_stats/samtools_stats/2.0.8` was updated to `toolshed.g2.bx.psu.edu/repos/devteam/samto
